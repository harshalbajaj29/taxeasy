<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAWala — CA Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--bg2:#eeede8;--surface:#ffffff;--surface2:#f8f7f3;--surface3:#f0efe9;
  --border:#e2e0d8;--border2:#d4d2c8;--accent:#1a6b4a;--accent2:#15563c;--accent-light:#e8f5ef;
  --accent-mid:#b8dece;--amber:#c27c0e;--amber-light:#fef3dc;--red:#c0392b;--red-light:#fdecea;
  --blue:#1a5276;--blue-light:#e8f0f8;--purple:#6b3fa0;--purple-light:#f0eaf8;
  --text:#1c1917;--text2:#57534e;--text3:#a8a29e;--text4:#d6d3cd;
  --r:8px;--r-lg:12px;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.08)
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button,input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* LOGIN */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-wrap{width:100%;max-width:420px;padding:20px}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:40px;justify-content:center}
.brand-icon{width:40px;height:40px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;color:white;font-family:'Fraunces',serif;font-weight:600}
.brand-name{font-family:'Fraunces',serif;font-size:24px;font-weight:600}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:36px 32px;box-shadow:var(--shadow-md)}
.login-card h2{font-family:'Fraunces',serif;font-size:22px;font-weight:600;margin-bottom:4px}
.login-card .subtitle{color:var(--text2);font-size:13px;margin-bottom:28px}
.form-field{margin-bottom:16px}
.form-field label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.form-field input{width:100%;padding:10px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;transition:border-color .15s}
.form-field input:focus{outline:none;border-color:var(--accent);background:white}
.form-field input::placeholder{color:var(--text3)}
.btn-login{width:100%;padding:11px;background:var(--accent);border:none;border-radius:var(--r);color:white;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .15s}
.btn-login:hover{background:var(--accent2)}
.login-error{color:var(--red);font-size:12px;margin-top:10px;min-height:16px}

/* APP */
#app{display:none;height:100vh;flex-direction:column}
#app.visible{display:flex}

/* TOP BAR */
.topbar{display:flex;align-items:center;gap:12px;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;height:56px}
.topbar-brand{display:flex;align-items:center;gap:8px;margin-right:8px;flex-shrink:0}
.topbar-brand .brand-icon{width:28px;height:28px;border-radius:7px;font-size:13px}
.topbar-brand .brand-name{font-family:'Fraunces',serif;font-size:15px;font-weight:600}
.client-dropdown-wrap{position:relative;flex-shrink:0}
.client-dropdown{padding:7px 32px 7px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;appearance:none;min-width:200px;transition:border-color .15s}
.client-dropdown:focus{outline:none;border-color:var(--accent)}
.client-dropdown-wrap::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text3);pointer-events:none}
.topbar-search{flex:1;position:relative}
.topbar-search input{width:100%;padding:7px 12px 7px 32px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;transition:border-color .15s}
.topbar-search input:focus{outline:none;border-color:var(--accent);background:white}
.topbar-search input::placeholder{color:var(--text3)}
.topbar-search::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:11px;pointer-events:none}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn-sm{padding:6px 12px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;border:1.5px solid var(--border);background:var(--surface);color:var(--text2)}
.btn-sm:hover{border-color:var(--border2);color:var(--text)}
.btn-primary-sm{padding:6px 12px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;background:var(--accent);border:none;color:white;transition:background .12s}
.btn-primary-sm:hover{background:var(--accent2)}
.user-av{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;cursor:pointer;flex-shrink:0}

/* MAIN LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sb-nav{flex:1;padding:10px 8px}
.nav-section{margin-bottom:18px}
.nav-section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;padding:0 8px;margin-bottom:4px}
.nav-btn{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left}
.nav-btn:hover{background:var(--surface3);color:var(--text)}
.nav-btn.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.nav-btn svg{width:14px;height:14px;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:9px;font-weight:700;background:var(--red);color:white;padding:1px 5px;border-radius:10px}

/* MAIN CONTENT */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.page-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.page-header h1{font-family:'Fraunces',serif;font-size:16px;font-weight:600}
.page-header p{font-size:11px;color:var(--text3);margin-top:1px}
.page{flex:1;overflow-y:auto;padding:18px 20px}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.stat-card:hover{border-color:var(--border2);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.stat-icon{font-size:16px;margin-bottom:8px}
.stat-label{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:700;letter-spacing:-.5px;line-height:1;font-family:'Fraunces',serif}
.stat-sub{font-size:10px;color:var(--text3);margin-top:4px}
.stat-card.green .stat-val{color:var(--accent)}
.stat-card.blue .stat-val{color:var(--blue)}
.stat-card.amber .stat-val{color:var(--amber)}
.stat-card.purple .stat-val{color:var(--purple)}
.stat-card.red .stat-val{color:var(--red)}

/* PANELS */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface2)}
.panel-head h3{font-size:12px;font-weight:600;color:var(--text)}
.panel-count{font-size:10px;font-weight:600;color:var(--text3);background:var(--surface3);padding:2px 7px;border-radius:20px;border:1px solid var(--border)}

/* TABLE */
.table-wrap{overflow:auto;flex:1}
table{width:100%;border-collapse:collapse}
thead th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1.5px solid var(--border);white-space:nowrap;background:var(--surface2);position:sticky;top:0;z-index:1}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text);font-size:13px}
tbody tr{cursor:pointer;transition:background .08s}
tbody tr:hover td{background:var(--surface2)}
tbody tr:last-child td{border-bottom:none}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:capitalize}
.b-receipt{background:var(--accent-light);color:var(--accent)}
.b-invoice{background:#e8edff;color:#3b5bdb}
.b-expense{background:var(--amber-light);color:var(--amber)}
.b-document{background:var(--amber-light);color:var(--amber)}
.b-question{background:var(--blue-light);color:var(--blue)}
.b-appointment{background:var(--purple-light);color:var(--purple)}
.b-general,.b-general_text{background:var(--surface3);color:var(--text3)}
.b-answered{background:var(--accent-light);color:var(--accent)}
.b-pending{background:var(--amber-light);color:var(--amber)}
.b-confirmed{background:var(--accent-light);color:var(--accent)}
.b-paid{background:var(--accent-light);color:var(--accent)}
.b-unpaid{background:var(--red-light);color:var(--red)}
.b-overdue{background:var(--red-light);color:var(--red)}
.b-review{background:var(--red-light);color:var(--red)}
.b-processed{background:var(--accent-light);color:var(--accent)}

.mono{font-family:'DM Mono',monospace;font-size:12px}
.amt{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:var(--accent)}
.desc-cell{color:var(--text2);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.empty-icon{font-size:28px;margin-bottom:10px;opacity:.35}
.empty p{color:var(--text3);font-size:13px}

/* SPINNER */
.spin-wrap{display:flex;align-items:center;justify-content:center;padding:60px}
.spinner{width:22px;height:22px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .55s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* DRAWER */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:90;backdrop-filter:blur(2px)}
.overlay.open{display:block}
.drawer{position:fixed;right:-520px;top:0;width:500px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:100;transition:right .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.08)}
.drawer.open{right:0}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface2)}
.drawer-head h3{font-family:'Fraunces',serif;font-size:15px;font-weight:600}
.drawer-close{background:var(--surface);border:1.5px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;padding:3px 8px;font-size:15px;line-height:1}
.drawer-body{padding:20px;flex:1}
.dr{margin-bottom:16px}
.dr .dl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.dr .dv{font-size:14px;color:var(--text)}
.dr .dv.big{font-size:22px;font-weight:700;color:var(--accent);font-family:'Fraunces',serif}
.drawer-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.raw-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px;font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;line-height:1.8;white-space:pre-wrap;word-break:break-word;max-height:180px;overflow-y:auto}
.ai-box{background:var(--accent-light);border:1px solid var(--accent-mid);border-radius:var(--r);padding:12px;font-size:13px;color:var(--text);line-height:1.7;margin-top:4px}
.reply-wrap{margin-top:8px}
.reply-wrap textarea{width:100%;padding:10px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;resize:vertical;min-height:80px;transition:border-color .12s}
.reply-wrap textarea:focus{outline:none;border-color:var(--accent);background:white}
.reply-wrap textarea::placeholder{color:var(--text3)}
.btn-reply{margin-top:8px;padding:8px 16px;background:var(--accent);border:none;border-radius:var(--r);color:white;font-size:13px;font-weight:600;cursor:pointer;transition:background .12s}
.btn-reply:hover{background:var(--accent2)}
.reply-sent{color:var(--accent);font-size:12px;font-weight:500;margin-top:6px;display:none}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;align-items:center;background:var(--surface2)}
.toolbar .search-input{flex:1}
.search-input{width:100%;padding:6px 10px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;transition:border-color .12s}
.search-input:focus{outline:none;border-color:var(--accent)}
.search-input::placeholder{color:var(--text3)}
.type-select{padding:6px 10px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:12px;cursor:pointer}

/* HOME PANELS */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.home-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow)}
.home-panel-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.home-panel-head h3{font-size:12px;font-weight:600}
.see-all{font-size:11px;color:var(--accent);cursor:pointer;font-weight:500}
.see-all:hover{text-decoration:underline}
.act-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);transition:background .08s;cursor:pointer}
.act-item:hover{background:var(--surface2)}
.act-item:last-child{border-bottom:none}
.act-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.act-info{flex:1;min-width:0}
.act-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-time{font-size:10px;color:var(--text3)}
.act-amt{font-size:12px;font-family:'DM Mono',monospace;color:var(--accent);font-weight:600}

/* 360 VIEW */
.client-360{display:grid;grid-template-columns:280px 1fr;gap:14px;height:calc(100vh - 130px)}
.client-info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.client-avatar-big{width:56px;height:56px;border-radius:50%;background:var(--accent-light);border:2px solid var(--accent-mid);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;flex-shrink:0}
.client-info-row{display:flex;gap:12px;align-items:flex-start}
.client-info-details{flex:1;min-width:0}
.client-name{font-size:16px;font-weight:600;font-family:'Fraunces',serif}
.client-phone-text{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px}
.info-field{margin-bottom:10px}
.info-field .label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.info-field .value{font-size:13px;color:var(--text)}
.action-btns{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.action-btn{padding:8px 12px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);text-align:center;transition:all .12s}
.action-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.action-btn.primary{background:var(--accent);color:white;border-color:var(--accent)}
.action-btn.primary:hover{background:var(--accent2)}

.client-360-right{display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.tabs-row{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:4px}
.tab-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);transition:all .12s;white-space:nowrap}
.tab-btn.active{background:var(--accent);color:white;border-color:var(--accent)}
.tab-btn:hover:not(.active){border-color:var(--border2);color:var(--text)}
.tab-content{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow);flex:1}

/* QA ITEMS */
.qa-item{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .08s}
.qa-item:hover{background:var(--surface2)}
.qa-item:last-child{border-bottom:none}
.qa-question{font-size:13px;font-weight:500;margin-bottom:3px}
.qa-answer{font-size:12px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* APPOINTMENT ITEMS */
.appt-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .08s}
.appt-item:hover{background:var(--surface2)}
.appt-item:last-child{border-bottom:none}
.appt-date-box{width:40px;height:40px;border-radius:var(--r);background:var(--purple-light);border:1px solid #d8c8f0;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.appt-day{font-size:15px;font-weight:700;color:var(--purple);line-height:1;font-family:'Fraunces',serif}
.appt-info{flex:1;min-width:0}
.appt-time{font-size:12px;font-weight:500}
.appt-client{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.appt-notes{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* DOCUMENT GRID */
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:14px}
.doc-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:12px;cursor:pointer;transition:all .15s}
.doc-card:hover{border-color:var(--border2);box-shadow:var(--shadow-md)}
.doc-icon{font-size:24px;margin-bottom:8px}
.doc-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.doc-type{font-size:10px;color:var(--text3)}
.doc-date{font-size:10px;color:var(--text3);margin-top:3px}

/* REMINDER ITEMS */
.reminder-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);transition:background .08s}
.reminder-item:hover{background:var(--surface2)}
.reminder-item:last-child{border-bottom:none}
.reminder-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.reminder-info{flex:1;min-width:0}
.reminder-title{font-size:13px;font-weight:500}
.reminder-meta{font-size:11px;color:var(--text3);margin-top:2px}
.reminder-date{font-size:11px;font-family:'DM Mono',monospace;color:var(--amber);font-weight:500;white-space:nowrap}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r-lg);padding:24px;width:100%;max-width:480px;box-shadow:var(--shadow-md);border:1px solid var(--border)}
.modal h3{font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin-bottom:16px}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;padding:8px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;transition:border-color .12s}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{outline:none;border-color:var(--accent);background:white}
.modal-field textarea{min-height:80px;resize:vertical}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal-btn-cancel{padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2)}
.modal-btn-save{padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;background:var(--accent);border:none;color:white}

/* UPLOAD ZONE */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r-lg);padding:24px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface2)}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-light)}
.upload-zone p{font-size:13px;color:var(--text2);margin-top:6px}
.upload-zone .upload-icon{font-size:28px}
.upload-progress{margin-top:10px;display:none}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}

/* COMING SOON */
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;flex:1}
.coming-soon-icon{font-size:40px;margin-bottom:14px;opacity:.4}
.coming-soon h3{font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin-bottom:6px}
.coming-soon p{font-size:13px;color:var(--text2);max-width:280px;line-height:1.7}
.coming-soon .tag{display:inline-block;margin-top:12px;padding:4px 12px;background:var(--accent-light);color:var(--accent);border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--accent-mid)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-wrap">
    <div class="login-brand"><div class="brand-icon">₹</div><div><div class="brand-name">CAWala</div><div style="font-size:11px;color:var(--text3)">CA Practice Management</div></div></div>
    <div class="login-card">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your CA firm dashboard</p>
      <div class="form-field"><label>Email address</label><input type="email" id="login-email" placeholder="ca@yourfirm.com" autofocus></div>
      <div class="form-field"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn-login" id="login-btn" onclick="doLogin()">Sign in to Dashboard</button>
      <div class="login-error" id="login-err"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-brand"><div class="brand-icon" style="width:28px;height:28px;border-radius:7px;font-size:13px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:white;font-family:'Fraunces',serif;font-weight:600">₹</div><span class="brand-name">CAWala</span></div>
    <div class="client-dropdown-wrap">
      <select class="client-dropdown" id="client-dropdown" onchange="onClientSelect(this.value)">
        <option value="">All Clients</option>
      </select>
    </div>
    <div class="topbar-search"><input type="text" placeholder="Search clients, receipts, documents..." id="global-search" oninput="onGlobalSearch(this.value)"></div>
    <div class="topbar-right">
      <button class="btn-sm" onclick="loadData()">↺ Refresh</button>
      <button class="btn-primary-sm" onclick="openModal('reminder')">+ Reminder</button>
      <div class="user-av" id="user-av" onclick="doLogout()" title="Sign out">CA</div>
    </div>
  </div>

  <div class="app-body">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sb-nav">
        <div class="nav-section">
          <div class="nav-section-label">Main</div>
          <button class="nav-btn active" data-view="home" onclick="gotoView('home')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Overview
          </button>
          <button class="nav-btn" data-view="client360" onclick="gotoView('client360')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Client 360
          </button>
          <button class="nav-btn" data-view="clients" onclick="gotoView('clients')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Manage Clients
          </button>
        </div>
        <div class="nav-section">
          <div class="nav-section-label">Activity</div>
          <button class="nav-btn" data-view="receipts" onclick="gotoView('receipts')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Receipts
          </button>
          <button class="nav-btn" data-view="qna" onclick="gotoView('qna')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Q&amp;A Inbox
            <span class="nav-badge" id="qna-badge" style="display:none">0</span>
          </button>
          <button class="nav-btn" data-view="appointments" onclick="gotoView('appointments')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Appointments
            <span class="nav-badge" id="appt-badge" style="display:none">0</span>
          </button>
          <button class="nav-btn" data-view="documents" onclick="gotoView('documents')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>Documents
          </button>
        </div>
        <div class="nav-section">
          <div class="nav-section-label">Finance</div>
          <button class="nav-btn" data-view="ca-invoices" onclick="gotoView('ca-invoices')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>CA Invoices
          </button>
          <button class="nav-btn" data-view="challans" onclick="gotoView('challans')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/></svg>Challans
          </button>
          <button class="nav-btn" data-view="reminders" onclick="gotoView('reminders')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Reminders
          </button>
        </div>
        <div class="nav-section">
          <div class="nav-section-label">Tools</div>
          <button class="nav-btn" data-view="tally" onclick="gotoView('tally')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Tally Import
          </button>
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div class="page-header">
        <div><h1 id="page-title">Overview</h1><p id="page-sub">Your firm at a glance</p></div>
        <div style="display:flex;gap:8px" id="page-actions"></div>
      </div>
      <div class="page" id="page-content"><div class="spin-wrap"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<!-- DRAWER -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head"><h3 id="drawer-title">Detail</h3><button class="drawer-close" onclick="closeDrawer()">✕</button></div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const SUPA_URL='https://luljdeuhpldtjnbcdwgo.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1bGpkZXVocGxkdGpuYmNkd2dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2ODYwMzEsImV4cCI6MjA4OTI2MjAzMX0.OjaFweTgBsnXtynuYuvGK27UjFSEPAhB9XHh1TQwXIU';
const sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);
let invoices=[],clients=[],questions=[],appointments=[],documents=[],reminders=[],caInvoices=[],challans=[];
let currentView='home',selectedClient=null;

/* AUTH */
async function doLogin(){
  const btn=document.getElementById('login-btn'),err=document.getElementById('login-err');
  const email=document.getElementById('login-email').value.trim(),pass=document.getElementById('login-password').value;
  err.textContent='';
  if(!email||!pass){err.textContent='Please fill in both fields';return}
  btn.textContent='Signing in...';btn.disabled=true;
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  btn.textContent='Sign in to Dashboard';btn.disabled=false;
  if(error){err.textContent=error.message;return}
  bootApp(data.user);
}
async function doLogout(){await sb.auth.signOut();document.getElementById('app').classList.remove('visible');document.getElementById('login-page').style.display='flex'}
function bootApp(user){
  document.getElementById('login-page').style.display='none';
  document.getElementById('app').classList.add('visible');
  const email=user.email||'';
  document.getElementById('user-av').textContent=email.slice(0,2).toUpperCase();
  loadData();
}

/* DATA */
async function loadData(){
  setContent('<div class="spin-wrap"><div class="spinner"></div></div>');
  const[invRes,qRes,apptRes,docRes,remRes,caInvRes,chalRes,cliRes]=await Promise.all([
    sb.from('invoices').select('*').order('received_at',{ascending:false}),
    sb.from('questions').select('*').order('created_at',{ascending:false}),
    sb.from('appointments').select('*').order('created_at',{ascending:false}),
    sb.from('documents').select('*').order('created_at',{ascending:false}),
    sb.from('reminders').select('*').order('due_date',{ascending:true}),
    sb.from('ca_invoices').select('*').order('created_at',{ascending:false}),
    sb.from('challans').select('*').order('created_at',{ascending:false}),
    sb.from('clients').select('*').order('name',{ascending:true})
  ]);
  invoices=invRes.data||[];questions=qRes.data||[];appointments=apptRes.data||[];
  documents=docRes.data||[];reminders=remRes.data||[];caInvoices=caInvRes.data||[];challans=chalRes.data||[];
  const dbClients=cliRes.data||[];
  const phones=[...new Set([...dbClients.map(c=>c.phone),...invoices.map(i=>i.client_phone).filter(Boolean)])];
  clients=phones.map(phone=>{
    const db=dbClients.find(c=>c.phone===phone)||{};
    return{phone,id:db.id||null,name:db.name||null,business_name:db.business_name||null,
      email:db.email||null,pan_number:db.pan_number||null,gst_number:db.gst_number||null,
      address:db.address||null,notes:db.notes||null,is_active:db.is_active!==false,
      count:invoices.filter(i=>i.client_phone===phone).length,
      lastSeen:invoices.filter(i=>i.client_phone===phone)[0]?.received_at,
      total:invoices.filter(i=>i.client_phone===phone).reduce((s,i)=>s+(parseFloat(i.amount)||0),0)};
  }).sort((a,b)=>(a.name||a.phone).localeCompare(b.name||b.phone));
  updateBadges();
  populateClientDropdown();
  renderView();
}

function updateBadges(){
  const pq=questions.filter(q=>q.needs_ca_review&&q.status!=='ca_replied').length;
  const pa=appointments.filter(a=>a.status==='pending').length;
  const qb=document.getElementById('qna-badge'),ab=document.getElementById('appt-badge');
  if(qb){qb.textContent=pq;qb.style.display=pq>0?'inline':'none'}
  if(ab){ab.textContent=pa;ab.style.display=pa>0?'inline':'none'}
}

function populateClientDropdown(){
  const dd=document.getElementById('client-dropdown');
  const val=dd.value;
  dd.innerHTML='<option value="">All Clients</option>';
  clients.forEach(c=>{
    const opt=document.createElement('option');
    opt.value=c.phone;
    opt.textContent=c.name?c.name+' ('+c.phone+')':c.phone;
    dd.appendChild(opt);
  });
  if(val)dd.value=val;
}

function onClientSelect(phone){
  if(phone){
    selectedClient=clients.find(c=>c.phone===phone)||{phone};
    gotoView('client360');
  } else {
    selectedClient=null;
    gotoView('home');
  }
}

function onGlobalSearch(val){
  if(!val)return;
  gotoView('receipts');
  setTimeout(()=>{
    const inp=document.querySelector('#page-content .search-input');
    if(inp){inp.value=val;renderReceipts(val,'');}
  },100);
}

/* ROUTING */
function gotoView(v){
  currentView=v;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  const titles={
    home:['Overview','Your firm at a glance'],
    client360:['Client 360','Complete client profile and history'],
    receipts:['Receipts','All invoices and receipts'],
    qna:['Q&A Inbox','Client questions and AI answers'],
    appointments:['Appointments','Meeting requests from clients'],
    documents:['Documents','Client documents and files'],
    'ca-invoices':['CA Invoices','Invoices raised to clients'],
    challans:['Challans','Tax challans and payments'],
    reminders:['Reminders','Client reminders and follow-ups'],
    tally:['Tally Import','Import data from Tally backup'],
    clients:['Manage Clients','Add, edit and delete your clients']
  };
  const t=titles[v]||['Dashboard',''];
  document.getElementById('page-title').textContent=t[0];
  document.getElementById('page-sub').textContent=t[1];
  const pa=document.getElementById('page-actions');
  pa.innerHTML='';
  if(v==='receipts'){pa.innerHTML='<button class="btn-sm" onclick="exportCSV()">↓ Export CSV</button>'}
  if(v==='ca-invoices'){pa.innerHTML='<button class="btn-primary-sm" onclick="openModal(\'ca-invoice\')">+ New Invoice</button>'}
  if(v==='challans'){pa.innerHTML='<button class="btn-primary-sm" onclick="openModal(\'challan\')">+ New Challan</button>'}
  if(v==='reminders'){pa.innerHTML='<button class="btn-primary-sm" onclick="openModal(\'reminder\')">+ Add Reminder</button>'}
  if(v==='documents'&&selectedClient){pa.innerHTML='<button class="btn-primary-sm" onclick="openModal(\'upload-doc\')">+ Upload Document</button>'}
  if(v==='clients'){pa.innerHTML='<button class="btn-primary-sm" onclick="openModal(\'add-client\')">'+'+ Add Client</button>'}
  renderView();
}

function renderView(){
  if(currentView==='home')renderHome();
  else if(currentView==='client360')renderClient360();
  else if(currentView==='receipts')renderReceipts('','');
  else if(currentView==='qna')renderQnA('','');
  else if(currentView==='appointments')renderAppointments('');
  else if(currentView==='documents')renderDocuments('');
  else if(currentView==='ca-invoices')renderCAInvoices();
  else if(currentView==='challans')renderChallans();
  else if(currentView==='reminders')renderReminders();
  else if(currentView==='clients')renderClients();
  else if(currentView==='tally')renderTally();
}
function setContent(html){document.getElementById('page-content').innerHTML=html}

/* HOME */
function renderHome(){
  const now=new Date();
  const thisMonth=invoices.filter(i=>{const d=new Date(i.received_at);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()});
  const totalAmt=invoices.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const pendingAppt=appointments.filter(a=>a.status==='pending').length;
  const pendingQna=questions.filter(q=>q.needs_ca_review&&q.status!=='ca_replied').length;
  const pendingReminders=reminders.filter(r=>r.status==='pending').length;
  const tc={invoice:'#3b5bdb',receipt:'#1a6b4a',expense:'#c27c0e',general_text:'#a8a29e'};
  setContent(`
    <div class="stats-row">
      <div class="stat-card" onclick="gotoView('receipts')"><div class="stat-icon">🧾</div><div class="stat-label">Total receipts</div><div class="stat-val">${invoices.length}</div><div class="stat-sub">${thisMonth.length} this month</div></div>
      <div class="stat-card green" onclick="gotoView('receipts')"><div class="stat-icon">₹</div><div class="stat-label">Total amount</div><div class="stat-val">₹${fmtAmt(totalAmt)}</div><div class="stat-sub">Across all receipts</div></div>
      <div class="stat-card blue" onclick="gotoView('client360')"><div class="stat-icon">👥</div><div class="stat-label">Active clients</div><div class="stat-val">${clients.length}</div><div class="stat-sub">Unique numbers</div></div>
      <div class="stat-card amber" onclick="gotoView('appointments')"><div class="stat-icon">📅</div><div class="stat-label">Pending appts</div><div class="stat-val">${pendingAppt}</div><div class="stat-sub">Awaiting confirmation</div></div>
      <div class="stat-card red" onclick="gotoView('reminders')"><div class="stat-icon">🔔</div><div class="stat-label">Reminders due</div><div class="stat-val">${pendingReminders}</div><div class="stat-sub">Need attention</div></div>
    </div>
    <div class="home-grid">
      <div class="home-panel">
        <div class="home-panel-head"><h3>Recent receipts</h3><span class="see-all" onclick="gotoView('receipts')">See all →</span></div>
        ${invoices.slice(0,8).map(inv=>`<div class="act-item" onclick="openReceiptDrawer('${inv.id}')"><div class="act-dot" style="background:${tc[inv.message_type]||'#d6d3cd'}"></div><div class="act-info"><div class="act-title">${inv.vendor_name||inv.description||'Unknown'}</div><div class="act-time">${(inv.client_phone||'').replace('+91','')} · ${fmtDate(inv.received_at)}</div></div><div class="act-amt">${inv.amount?'₹'+fmtAmt(parseFloat(inv.amount)):'—'}</div></div>`).join('')}
        ${invoices.length===0?'<div class="empty"><div class="empty-icon">📭</div><p>No receipts yet</p></div>':''}
      </div>
      <div class="home-panel">
        <div class="home-panel-head"><h3>Pending reminders</h3><span class="see-all" onclick="gotoView('reminders')">See all →</span></div>
        ${reminders.filter(r=>r.status==='pending').slice(0,6).map(r=>`<div class="act-item" onclick="openReminderDrawer('${r.id}')"><div class="act-dot" style="background:${r.is_all_clients?'#6b3fa0':'#1a6b4a'}"></div><div class="act-info"><div class="act-title">${r.title||'Reminder'}</div><div class="act-time">${r.is_all_clients?'All clients':r.client_phone||''}</div></div><div class="reminder-date">${r.due_date||'—'}</div></div>`).join('')}
        ${reminders.filter(r=>r.status==='pending').length===0?'<div class="empty"><div class="empty-icon">✅</div><p>No pending reminders</p></div>':''}
        <div class="home-panel-head" style="margin-top:0"><h3>Recent questions</h3><span class="see-all" onclick="gotoView(\'qna\')">See all →</span></div>
        ${questions.slice(0,3).map(q=>`<div class="act-item" onclick="openQnaDrawer('${q.id}')"><div class="act-dot" style="background:${q.needs_ca_review?'#c0392b':'#1a6b4a'}"></div><div class="act-info"><div class="act-title">${q.question||'—'}</div><div class="act-time">${(q.client_phone||'').replace('+91','')} · ${fmtDate(q.created_at)}</div></div><span class="badge ${q.needs_ca_review?'b-review':'b-answered'}">${q.needs_ca_review?'Review':'Done'}</span></div>`).join('')}
        ${questions.length===0?'<div class="empty" style="padding:20px"><div class="empty-icon" style="font-size:20px">💬</div><p>No questions yet</p></div>':''}
      </div>
    </div>`);
}

/* CLIENT 360 */
function renderClient360(){
  const client=selectedClient||clients[0];
  if(!client){setContent('<div class="empty"><div class="empty-icon">👤</div><p>Select a client from the dropdown above</p></div>');return}
  const phone=client.phone;
  const clientInvoices=invoices.filter(i=>i.client_phone===phone);
  const clientDocs=documents.filter(d=>d.client_phone===phone);
  const clientQuestions=questions.filter(q=>q.client_phone===phone);
  const clientAppts=appointments.filter(a=>a.client_phone===phone);
  const clientReminders=reminders.filter(r=>r.client_phone===phone||r.is_all_clients);
  const clientCAInvoices=caInvoices.filter(i=>i.client_phone===phone);
  const clientChallans=challans.filter(c=>c.client_phone===phone);
  const totalSpent=clientInvoices.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const totalOwed=clientCAInvoices.filter(i=>i.status==='unpaid').reduce((s,i)=>s+(parseFloat(i.amount)||0),0);

  setContent(`
    <div class="client-360">
      <div class="client-info-card">
        <div class="client-info-row">
          <div class="client-avatar-big">${client.name?client.name.slice(0,2).toUpperCase():phone.slice(-4)}</div>
          <div class="client-info-details">
            <div class="client-name">${client.name||phone}</div>
            <div class="client-phone-text">${phone}</div>
          </div>
        </div>

function show360Tab(btn,tabId){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
  const tab=document.getElementById(tabId);
  if(tab)tab.style.display='block';
}

/* RECEIPTS */
function renderReceipts(search,type){
  let inv=invoices;
  if(selectedClient)inv=inv.filter(i=>i.client_phone===selectedClient.phone);
  if(type)inv=inv.filter(i=>i.message_type===type);
  if(search)inv=inv.filter(i=>(i.vendor_name||'').toLowerCase().includes(search.toLowerCase())||(i.client_phone||'').includes(search)||(i.description||'').toLowerCase().includes(search.toLowerCase()));
  setContent(`<div class="panel" style="height:calc(100vh - 130px)">
    <div class="panel-head"><h3>All Receipts</h3><span class="panel-count">${inv.length} of ${invoices.length}</span></div>
    <div class="toolbar"><input class="search-input" placeholder="Search vendor, client..." value="${search}" oninput="renderReceipts(this.value,document.getElementById('all-type-sel').value)"><select class="type-select" id="all-type-sel" onchange="renderReceipts(document.querySelector('#page-content .search-input').value,this.value)"><option value="">All types</option><option value="receipt">Receipt</option><option value="invoice">Invoice</option><option value="expense">Expense</option></select></div>
    <div class="table-wrap">${renderTable(inv)}</div>
  </div>`);
}

function renderTable(data){
  if(!data||data.length===0)return'<div class="empty"><div class="empty-icon">📭</div><p>No receipts found</p></div>';
  return`<table><thead><tr><th>Date</th><th>Client</th><th>Type</th><th>Vendor</th><th>Amount</th><th>Description</th></tr></thead><tbody>${data.map(inv=>`<tr onclick="openReceiptDrawer('${inv.id}')"><td class="mono">${fmtDate(inv.received_at)}</td><td class="mono" style="color:var(--text2)">${(inv.client_phone||'—').replace('+91','')}</td><td><span class="badge b-${inv.message_type||'receipt'}">${(inv.message_type||'receipt').replace('_',' ')}</span></td><td style="font-weight:500">${inv.vendor_name||'—'}</td><td class="amt">${inv.amount?'₹'+fmtAmt(parseFloat(inv.amount)):'—'}</td><td class="desc-cell">${inv.description||inv.raw_text||'—'}</td></tr>`).join('')}</tbody></table>`;
}

/* Q&A */
function renderQnA(search,filter){
  let qs=questions;
  if(selectedClient)qs=qs.filter(q=>q.client_phone===selectedClient.phone);
  if(filter==='review')qs=qs.filter(q=>q.needs_ca_review);
  if(filter==='answered')qs=qs.filter(q=>!q.needs_ca_review);
  if(search)qs=qs.filter(q=>(q.question||'').toLowerCase().includes(search.toLowerCase()));
  setContent(`<div class="panel" style="height:calc(100vh - 130px)">
    <div class="panel-head"><h3>Q&amp;A Inbox</h3><span class="panel-count">${qs.length}</span></div>
    <div class="toolbar"><input class="search-input" placeholder="Search questions..." value="${search}" oninput="renderQnA(this.value,document.getElementById('qna-filter').value)"><select class="type-select" id="qna-filter" onchange="renderQnA(document.querySelector('#page-content .search-input').value,this.value)"><option value="">All</option><option value="review">Needs review</option><option value="answered">Answered</option></select></div>
    <div class="table-wrap">${qs.length===0?'<div class="empty"><div class="empty-icon">💬</div><p>No questions yet</p></div>':qs.map(q=>`<div class="qa-item" onclick="openQnaDrawer('${q.id}')"><div style="display:flex;align-items:center;gap:8px;margin-bottom:5px"><span class="badge ${q.needs_ca_review?'b-review':'b-answered'}">${q.needs_ca_review?'Needs review':'AI answered'}</span><span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${(q.client_phone||'').replace('+91','')}</span><span style="margin-left:auto;font-size:10px;color:var(--text3)">${fmtDate(q.created_at)}</span></div><div class="qa-question">${q.question||'—'}</div><div class="qa-answer">${q.ai_answer||q.ca_reply||'No answer yet'}</div></div>`).join('')}</div>

    (c.pan_number||'').toLowerCase().includes(search.toLowerCase())||

async function handleTallyUpload(input){
  if(!input.files||!input.files[0])return;
  const file=input.files[0];
  const progress=document.getElementById('tally-progress');
  const fill=document.getElementById('tally-progress-fill');
  const text=document.getElementById('tally-progress-text');
  progress.style.display='block';
  text.textContent='Uploading '+file.name+'...';
  fill.style.width='30%';
  const fileName='tally_'+Date.now()+'_'+file.name;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    fill.style.width='60%';
    const{data,error}=await sb.storage.from('documents').upload('tally/'+fileName,file,{contentType:file.type});
    if(error){text.textContent='Upload failed: '+error.message;fill.style.width='0%';return}
    const fileUrl=SUPA_URL+'/storage/v1/object/public/documents/tally/'+fileName;
    await sb.from('documents').insert({doc_type:'tally_backup',file_name:fileName,file_url:fileUrl,summary:'Tally backup uploaded — processing scheduled',status:'pending'});
    fill.style.width='100%';
    text.textContent='Uploaded successfully! Will be processed within 24 hours.';
    setTimeout(()=>{progress.style.display='none';fill.style.width='0%'},4000);
  };
  reader.readAsArrayBuffer(file);
}

/* MODALS */
function openModal(type,phone=''){

    modal.innerHTML=`<h3>Add Reminder</h3>
      <div class="modal-field"><label>Title</label><input type="text" id="rem-title" placeholder="GST filing reminder, document collection..."></div>
      <div class="modal-field"><label>For client</label><select id="rem-client"><option value="">All clients</option>${clientOptions}</select></div>
      <div class="modal-field"><label>Due date</label><input type="date" id="rem-date"></div>
      <div class="modal-field"><label>Notes</label><textarea id="rem-notes" placeholder="Additional details..."></textarea></div>
      <div class="modal-btns"><button class="modal-btn-cancel" onclick="closeModal()">Cancel</button><button class="modal-btn-save" onclick="saveReminder()">Save Reminder</button></div>`;

    modal.innerHTML=`<h3>New CA Invoice</h3>
      <div class="modal-field"><label>Client</label><select id="inv-client"><option value="">Select client</option>${clientOptions}</select></div>

      <div class="modal-field"><label>Amount (₹)</label><input type="number" id="inv-amount" placeholder="5000"></div>
      <div class="modal-field"><label>Description</label><input type="text" id="inv-desc" placeholder="GST filing for Q1 2025"></div>
      <div class="modal-field"><label>Due date</label><input type="date" id="inv-due"></div>
      <div class="modal-btns"><button class="modal-btn-cancel" onclick="closeModal()">Cancel</button><button class="modal-btn-save" onclick="saveCAInvoice()">Save Invoice</button></div>`;
  } else if(type==='challan'){
    modal.innerHTML=`<h3>New Challan</h3>
      <div class="modal-field"><label>Client</label><select id="chal-client"><option value="">Select client</option>${clientOptions}</select></div>
      <div class="modal-field"><label>Challan type</label><select id="chal-type"><option value="">Select type</option><option>Advance Tax</option><option>Self Assessment Tax</option><option>TDS</option><option>GST</option><option>Professional Tax</option></select></div>
      <div class="modal-field"><label>Amount (₹)</label><input type="number" id="chal-amount" placeholder="10000"></div>
      <div class="modal-field"><label>Period</label><input type="text" id="chal-period" placeholder="Q1 FY 2025-26"></div>
      <div class="modal-btns"><button class="modal-btn-cancel" onclick="closeModal()">Cancel</button><button class="modal-btn-save" onclick="saveChallan()">Save Challan</button></div>`;
  } else if(type==='add-client'){
    modal.innerHTML=`<h3>Add New Client</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="modal-field"><label>Phone number *</label><input type="text" id="ac-phone" placeholder="+919876543210"></div>
        <div class="modal-field"><label>Client name</label><input type="text" id="ac-name" placeholder="Ramesh Kumar"></div>
        <div class="modal-field"><label>Business name</label><input type="text" id="ac-business" placeholder="Ramesh Textiles Pvt Ltd"></div>
        <div class="modal-field"><label>Email</label><input type="email" id="ac-email" placeholder="ramesh@business.com"></div>
        <div class="modal-field"><label>PAN number</label><input type="text" id="ac-pan" placeholder="ABCDE1234F"></div>
        <div class="modal-field"><label>GST number</label><input type="text" id="ac-gst" placeholder="27ABCDE1234F1Z5"></div>
      </div>
      <div class="modal-field"><label>Address</label><input type="text" id="ac-address" placeholder="123 Main Street, Pune"></div>
      <div class="modal-field"><label>Notes</label><textarea id="ac-notes" placeholder="Any important notes about this client..."></textarea></div>
      <div class="modal-btns"><button class="modal-btn-cancel" onclick="closeModal()">Cancel</button><button class="modal-btn-save" onclick="saveAddClient()">Add Client</button></div>`;
  } else if(type==='edit-client'){
    const c=clients.find(x=>x.phone===phone)||{};
    modal.innerHTML=`<h3>Edit Client — ${c.name||phone}</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="modal-field"><label>Phone</label><input type="text" value="${c.phone||''}" disabled style="opacity:.6"></div>
        <div class="modal-field"><label>Client name</label><input type="text" id="ec-name" value="${c.name||''}"></div>

      </div>

      <div class="modal-field"><label>Notes</label><textarea id="ec-notes">${c.notes||''}</textarea></div>
      <div class="modal-field"><label>Status</label><select id="ec-active"><option value="true" ${c.is_active!==false?'selected':''}>Active</option><option value="false" ${c.is_active===false?'selected':''}>Inactive</option></select></div>

}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open')}

/* SAVE FUNCTIONS */
async function saveReminder(){
  const title=document.getElementById('rem-title').value.trim();
  const clientPhone=document.getElementById('rem-client').value;
  const dueDate=document.getElementById('rem-date').value;
  const notes=document.getElementById('rem-notes').value.trim();
  if(!title){alert('Please add a title');return}
  await sb.from('reminders').insert({title,client_phone:clientPhone||null,due_date:dueDate||null,notes,is_all_clients:!clientPhone,status:'pending'});
  closeModal();loadData();
}

async function saveCAInvoice(){
  const clientPhone=document.getElementById('inv-client').value;
  const invoiceNumber=document.getElementById('inv-number').value.trim();
  const amount=parseFloat(document.getElementById('inv-amount').value)||0;
  const description=document.getElementById('inv-desc').value.trim();
  const dueDate=document.getElementById('inv-due').value;
  if(!clientPhone||!amount){alert('Please fill client and amount');return}
  await sb.from('ca_invoices').insert({client_phone:clientPhone,invoice_number:invoiceNumber,amount,description,due_date:dueDate||null,status:'unpaid'});
  closeModal();loadData();
}

async function saveChallan(){
  const clientPhone=document.getElementById('chal-client').value;
  const challanType=document.getElementById('chal-type').value;
  const amount=parseFloat(document.getElementById('chal-amount').value)||0;
  const period=document.getElementById('chal-period').value.trim();
  if(!clientPhone){alert('Please select a client');return}
  await sb.from('challans').insert({client_phone:clientPhone,challan_type:challanType,amount,period,status:'pending'});
  closeModal();loadData();
}

async function saveUploadDoc(){
  const clientPhone=document.getElementById('udoc-client').value;
  const docType=document.getElementById('udoc-type').value;
  const file=document.getElementById('udoc-file').files[0];
  if(!clientPhone||!file){alert('Please select client and file');return}
  const fileName=clientPhone+'_'+Date.now()+'_'+file.name;
  const{error}=await sb.storage.from('documents').upload(fileName,file,{contentType:file.type});
  if(error){alert('Upload failed: '+error.message);return}
  const fileUrl=SUPA_URL+'/storage/v1/object/public/documents/'+fileName;
  await sb.from('documents').insert({client_phone:clientPhone,doc_type:docType,file_name:file.name,file_url:fileUrl,status:'pending',summary:null});
  closeModal();loadData();
}

async function saveAddClient(){
  const phone=document.getElementById('ac-phone').value.trim();
  const name=document.getElementById('ac-name').value.trim();
  const business=document.getElementById('ac-business').value.trim();
  const pan=document.getElementById('ac-pan').value.trim().toUpperCase();
  const gst=document.getElementById('ac-gst').value.trim().toUpperCase();
  const email=document.getElementById('ac-email').value.trim();
  const address=document.getElementById('ac-address').value.trim();
  const notes=document.getElementById('ac-notes').value.trim();
  if(!phone){alert('Phone number is required');return}
  const{error}=await sb.from('clients').upsert({
    phone:phone,name:name||null,business_name:business||null,
    pan_number:pan||null,gst_number:gst||null,email:email||null,
    address:address||null,notes:notes||null,is_active:true
  },{onConflict:'phone'});
  if(error){alert('Error: '+error.message);return}
  closeModal();loadData();
}

async function saveEditClient(phone){
  const name=document.getElementById('ec-name').value.trim();
  const business=document.getElementById('ec-business').value.trim();
  const pan=document.getElementById('ec-pan').value.trim().toUpperCase();
  const gst=document.getElementById('ec-gst').value.trim().toUpperCase();
  const email=document.getElementById('ec-email').value.trim();
  const address=document.getElementById('ec-address').value.trim();
  const notes=document.getElementById('ec-notes').value.trim();
  const isActive=document.getElementById('ec-active').value==='true';
  const{error}=await sb.from('clients').update({
    name:name||null,business_name:business||null,pan_number:pan||null,
    gst_number:gst||null,email:email||null,address:address||null,
    notes:notes||null,is_active:isActive
  }).eq('phone',phone);
  if(error){alert('Error: '+error.message);return}
  closeModal();loadData();
}

async function deleteClient(phone){
  if(!confirm('Delete client '+phone+'? This will not delete their receipts or documents.'))return;
  await sb.from('clients').delete().eq('phone',phone);
  clients=clients.filter(c=>c.phone!==phone);
  populateClientDropdown();
  renderClients();
}

async function saveReply(qid){
  const text=document.getElementById('ca-reply-text')?.value?.trim();if(!text)return;
  await sb.from('questions').update({ca_reply:text,status:'ca_replied'}).eq('id',qid);
  const q=questions.find(x=>x.id===qid);if(q){q.ca_reply=text;q.status='ca_replied'}
  const msg=document.getElementById('reply-sent-msg');if(msg){msg.style.display='block';setTimeout(()=>msg.style.display='none',3000)}
}

async function confirmAppt(aid,status){
  const rt=document.getElementById('appt-reply-text')?.value?.trim();
  await sb.from('appointments').update({status,ca_reply:rt||''}).eq('id',aid);
  const a=appointments.find(x=>x.id===aid);if(a){a.status=status;a.ca_reply=rt}
  const msg=document.getElementById('appt-sent-msg');if(msg){msg.style.display='block';setTimeout(()=>{msg.style.display='none';closeDrawer();renderAppointments('')},2000)}
}

async function updateReminder(id,status){
  await sb.from('reminders').update({status}).eq('id',id);
  const r=reminders.find(x=>x.id===id);if(r)r.status=status;
  closeDrawer();renderReminders();
}

async function deleteReminder(id){
  await sb.from('reminders').delete().eq('id',id);
  reminders=reminders.filter(r=>r.id!==id);
  closeDrawer();renderReminders();
}

async function updateCAInvoice(id,status){
  await sb.from('ca_invoices').update({status}).eq('id',id);
  const inv=caInvoices.find(x=>x.id===id);if(inv)inv.status=status;
  closeDrawer();renderCAInvoices();
}

/* EXPORT */
function exportCSV(){
  const headers=['Date','Client','Type','Vendor','Amount','GST','Description'];
  const rows=invoices.map(i=>[fmtDate(i.received_at),i.client_phone||'',i.message_type||'',(i.vendor_name||'').replace(/,/g,' '),i.amount||'',i.gst_amount||'',(i.description||'').replace(/,/g,' ')]);
  const csv=[headers,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='cawala_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

/* HELPERS */
function docIcon(t){if(!t)return'📄';const s=t.toLowerCase();if(s.includes('bank'))return'🏦';if(s.includes('itr'))return'📊';if(s.includes('gst'))return'🧾';if(s.includes('pan'))return'💳';if(s.includes('aadhaar'))return'🪪';if(s.includes('tally'))return'📉';return'📁'}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}
function fmtAmt(n){if(!n||isNaN(n))return'0';return n.toLocaleString('en-IN',{maximumFractionDigits:0})}

sb.auth.getSession().then(({data:{session}})=>{if(session)bootApp(session.user)});
