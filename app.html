<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxnio — CA Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Source+Sans+3:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#fdf8f0;--cream2:#f7f0e4;--cream3:#ede4d3;--cream4:#e0d4be;
  --brown:#3d2b1f;--brown2:#5c4033;--brown3:#7d5a4a;--brown4:#a67c6a;
  --brown-light:#c4a882;--brown-lighter:#e8d9c4;
  --accent:#8b4513;--accent2:#6d3410;--accent-light:#f5e8dc;--accent-mid:#d4956a;
  --green:#2d6a4f;--green-light:#e8f5ee;--green-mid:#95c4a8;
  --amber:#b5720a;--amber-light:#fef3dc;
  --red:#8b1a1a;--red-light:#fdecea;
  --blue:#1a3a5c;--blue-light:#e8f0f8;
  --purple:#4a2070;--purple-light:#f0eaf8;
  --r:8px;--r-lg:14px;
  --shadow:0 1px 4px rgba(61,43,31,.08);
  --shadow-md:0 4px 16px rgba(61,43,31,.10);
  --shadow-lg:0 8px 32px rgba(61,43,31,.12);
}
html,body{height:100%;font-family:'Source Sans 3',sans-serif;background:var(--cream2);color:var(--brown);font-size:16px;line-height:1.65}
button,input,select,textarea{font-family:inherit}
h1,h2,h3{font-family:'Playfair Display',serif;font-weight:600;color:var(--brown)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--cream2)}::-webkit-scrollbar-thumb{background:var(--brown-lighter);border-radius:4px}

/* ── LOGIN ── */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--cream2)}
.login-wrap{width:100%;max-width:440px;padding:24px}
.login-brand{display:flex;justify-content:center;margin-bottom:32px}
.login-card{background:var(--cream);border:1px solid var(--cream3);border-radius:var(--r-lg);padding:40px 36px;box-shadow:var(--shadow-lg)}
.login-card h2{font-size:22px;margin-bottom:6px}
.login-sub{color:var(--brown3);font-size:13px;margin-bottom:24px}
.f-field{margin-bottom:16px}
.f-field label{display:block;font-size:11px;font-weight:600;color:var(--brown3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.f-field input{width:100%;padding:10px 14px;background:var(--cream2);border:1.5px solid var(--cream3);border-radius:var(--r);color:var(--brown);font-size:14px;transition:border-color .15s}
.f-field input:focus{outline:none;border-color:var(--accent);background:var(--cream)}
.f-field input::placeholder{color:var(--brown4)}
.btn-login{width:100%;padding:11px;background:var(--accent);border:none;border-radius:var(--r);color:var(--cream);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .15s}
.btn-login:hover{background:var(--accent2)}
.login-err{color:var(--red);font-size:12px;margin-top:10px;min-height:16px}

/* ── APP SHELL ── */
#app{display:none;height:100vh;flex-direction:column}
#app.show{display:flex}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:10px;padding:0 18px;border-bottom:1.5px solid var(--cream3);background:var(--cream);height:56px;flex-shrink:0;box-shadow:var(--shadow)}
.topbar-logo{display:flex;align-items:center;flex-shrink:0;margin-right:6px}
.tb-div{width:1px;height:26px;background:var(--cream3);flex-shrink:0}
.sel-wrap{position:relative;flex-shrink:0}
.sel-wrap::after{content:'▾';position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--brown4);pointer-events:none}
.client-sel{padding:6px 26px 6px 10px;background:var(--cream2);border:1.5px solid var(--cream3);border-radius:var(--r);color:var(--brown);font-size:13px;font-weight:500;cursor:pointer;appearance:none;min-width:190px}
.client-sel:focus{outline:none;border-color:var(--accent-mid)}
.tb-search{flex:1;position:relative}
.tb-search input{width:100%;padding:7px 10px 7px 32px;background:var(--cream2);border:1.5px solid var(--cream3);border-radius:var(--r);color:var(--brown);font-size:13px;transition:border-color .15s}
.tb-search input:focus{outline:none;border-color:var(--accent-mid);background:var(--cream)}
.tb-search input::placeholder{color:var(--brown4)}
.tb-search::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.notif-btn{width:32px;height:32px;border-radius:50%;background:var(--cream2);border:1.5px solid var(--cream3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;position:relative}
.notif-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid var(--cream);display:none}
.btn-sm{padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--cream3);background:var(--cream2);color:var(--brown2);transition:all .12s}
.btn-sm:hover{border-color:var(--accent-mid);color:var(--accent)}
.btn-pri{padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;background:var(--accent);border:none;color:var(--cream);transition:background .12s}
.btn-pri:hover{background:var(--accent2)}
.user-chip{display:flex;align-items:center;gap:7px;padding:4px 10px;background:var(--cream2);border:1.5px solid var(--cream3);border-radius:20px;cursor:pointer}
.user-chip:hover{border-color:var(--accent-mid)}
.u-av{width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--cream)}
.u-name{font-size:13px;font-weight:500;color:var(--brown2)}

/* ── BODY ── */
.app-body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:205px;flex-shrink:0;background:var(--cream);border-right:1.5px solid var(--cream3);display:flex;flex-direction:column;overflow-y:auto}
.sb-sec{padding:14px 8px 6px}
.sb-lbl{font-size:11px;font-weight:600;color:var(--brown4);text-transform:uppercase;letter-spacing:.9px;padding:0 8px;margin-bottom:5px}
.nav-btn{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--r);font-size:13px;font-weight:500;color:var(--brown3);cursor:pointer;transition:all .12s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-btn:hover{background:var(--cream2);color:var(--brown)}
.nav-btn.active{background:var(--accent-light);color:var(--accent);font-weight:600;border-left:3px solid var(--accent);padding-left:6px}
.nav-btn svg{width:14px;height:14px;flex-shrink:0;opacity:.7}
.nav-btn.active svg{opacity:1}
.nav-badge{margin-left:auto;font-size:9px;font-weight:700;background:var(--red);color:white;padding:1px 5px;border-radius:10px}
.sb-foot{padding:10px 8px;border-top:1.5px solid var(--cream3);margin-top:auto}
.sb-user{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);background:var(--cream2)}
.sb-av{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--cream);flex-shrink:0}
.sb-info{flex:1;min-width:0}
.sb-email{font-size:12px;font-weight:500;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-tag{font-size:10px;color:var(--brown4)}
.sb-logout{background:none;border:none;cursor:pointer;color:var(--brown4);font-size:14px;padding:3px;border-radius:5px}
.sb-logout:hover{color:var(--red)}

/* ── MAIN ── */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:var(--cream2)}
.pg-head{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1.5px solid var(--cream3);background:var(--cream);flex-shrink:0}
.pg-head h1{font-size:18px}
.pg-head p{font-size:11px;color:var(--brown4);margin-top:1px}
.pg-acts{display:flex;gap:8px}
.page{flex:1;overflow-y:auto;padding:18px 20px}

/* ── CARDS ── */
.card{background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r-lg);box-shadow:var(--shadow)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1.5px solid var(--cream3);background:var(--cream2)}
.card-head h3{font-size:13px;font-weight:600;color:var(--brown)}
.card-cnt{font-size:10px;font-weight:600;color:var(--brown4);background:var(--cream3);padding:2px 7px;border-radius:20px}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r-lg);padding:14px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.stat-card:hover{border-color:var(--accent-mid);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.stat-emoji{font-size:18px;margin-bottom:8px}
.stat-lbl{font-size:11px;font-weight:600;color:var(--brown4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1;color:var(--brown)}
.stat-sub{font-size:11px;color:var(--brown4);margin-top:4px}
.sc-green .stat-val{color:var(--green)}
.sc-amber .stat-val{color:var(--amber)}
.sc-red .stat-val{color:var(--red)}
.sc-blue .stat-val{color:var(--blue)}
.sc-accent .stat-val{color:var(--accent)}

/* ── QUICK ACTIONS ── */
.qa-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.qa-btn{background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r-lg);padding:12px 8px;text-align:center;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.qa-btn:hover{border-color:var(--accent-mid);background:var(--accent-light);transform:translateY(-1px)}
.qa-icon{font-size:20px;margin-bottom:5px}
.qa-lbl{font-size:13px;font-weight:600;color:var(--brown2)}

/* ── GRID LAYOUTS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}

/* ── CALENDAR ── */
.cal-card{background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow)}
.cal-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--brown);margin-bottom:4px}
.cal-sub{font-size:11px;color:var(--brown4);margin-bottom:14px}
.cal-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-left:8px}
.badge-ai{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-mid)}
.badge-custom{background:var(--blue-light);color:var(--blue);border:1px solid #b0c8e8}
.deadline-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--r);margin-bottom:6px;border:1px solid var(--cream3);background:var(--cream2);transition:all .12s;cursor:default}
.dl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dl-info{flex:1;min-width:0}
.dl-name{font-size:13px;font-weight:500;color:var(--brown)}
.dl-desc{font-size:11px;color:var(--brown4)}
.dl-date{font-size:11px;font-weight:600;font-family:'DM Mono',monospace;text-align:right;white-space:nowrap}
.dl-urgent{background:var(--red-light);border-color:#f0b0b0}
.dl-soon{background:var(--amber-light);border-color:#e8d090}
.dl-ok{background:var(--green-light);border-color:var(--green-mid)}
.add-event-btn{width:100%;margin-top:10px;padding:7px;border-radius:var(--r);border:1.5px dashed var(--cream4);background:transparent;color:var(--brown4);font-size:12px;cursor:pointer;transition:all .12s}
.add-event-btn:hover{border-color:var(--accent-mid);color:var(--accent);background:var(--accent-light)}
.custom-ev{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);border:1px solid var(--blue-light);background:#f0f5fc;margin-bottom:5px}
.cev-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);flex-shrink:0}
.cev-info{flex:1;min-width:0}
.cev-name{font-size:12px;font-weight:500;color:var(--blue)}
.cev-date{font-size:10px;color:var(--brown4)}
.cev-del{background:none;border:none;cursor:pointer;color:var(--brown4);font-size:14px;padding:0 3px}
.cev-del:hover{color:var(--red)}

/* ── FEED ── */
.feed-item{display:flex;align-items:flex-start;gap:9px;padding:9px 14px;border-bottom:1px solid var(--cream3);transition:background .08s;cursor:pointer}
.feed-item:hover{background:var(--cream2)}
.feed-item:last-child{border-bottom:none}
.feed-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.feed-info{flex:1;min-width:0}
.feed-title{font-size:13px;font-weight:500;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feed-sub{font-size:11px;color:var(--brown4)}
.feed-time{font-size:10px;color:var(--brown4);white-space:nowrap;font-family:'DM Mono',monospace}

/* ── OUTSTANDING ── */
.out-item{display:flex;align-items:center;gap:9px;padding:9px 14px;border-bottom:1px solid var(--cream3);transition:background .08s}
.out-item:hover{background:var(--cream2)}
.out-item:last-child{border-bottom:none}
.out-av{width:30px;height:30px;border-radius:50%;background:var(--accent-light);border:1px solid var(--accent-mid);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;flex-shrink:0}
.out-info{flex:1;min-width:0}
.out-name{font-size:12px;font-weight:500;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.out-days{font-size:10px;color:var(--brown4)}
.out-amt{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--red);margin-right:6px}
.remind-btn{padding:4px 9px;border-radius:var(--r);background:var(--accent-light);border:1px solid var(--accent-mid);color:var(--accent);font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap}
.remind-btn:hover{background:var(--accent);color:var(--cream)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:capitalize}
.b-receipt,.b-answered,.b-active,.b-done,.b-confirmed,.b-paid,.b-processed{background:var(--green-light);color:var(--green)}
.b-invoice{background:#e8edff;color:#3b5bdb}
.b-expense,.b-document,.b-pending,.b-quiet{background:var(--amber-light);color:var(--amber)}
.b-question{background:var(--blue-light);color:var(--blue)}
.b-appointment{background:var(--purple-light);color:var(--purple)}
.b-general,.b-other{background:var(--cream3);color:var(--brown4)}
.b-unpaid,.b-overdue,.b-review,.b-inactive,.b-error{background:var(--red-light);color:var(--red)}

/* ── HEALTH DOTS ── */
.h-active{background:#27ae60}.h-quiet{background:#f39c12}.h-inactive{background:#c0392b}

/* ── TABLE ── */
.tbl-wrap{overflow:auto;flex:1}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 14px;text-align:left;font-size:12px;font-weight:700;color:var(--brown4);text-transform:uppercase;letter-spacing:.6px;border-bottom:1.5px solid var(--cream3);white-space:nowrap;background:var(--cream2);position:sticky;top:0;z-index:1}
tbody td{padding:11px 14px;border-bottom:1px solid var(--cream3);vertical-align:middle;color:var(--brown);font-size:14px}
tbody tr{cursor:pointer;transition:background .08s}
tbody tr:hover td{background:var(--cream2)}
tbody tr:last-child td{border-bottom:none}
.mono{font-family:'DM Mono',monospace;font-size:13px}
.amt{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:var(--green)}
.desc-cell{color:var(--brown3);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── EMPTY / SPINNER ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.empty-icon{font-size:28px;margin-bottom:8px;opacity:.3}
.empty p{color:var(--brown4);font-size:13px}
.spin-wrap{display:flex;align-items:center;justify-content:center;padding:60px}
.spinner{width:22px;height:22px;border:2.5px solid var(--cream3);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PANEL ── */
.panel{background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r-lg);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1.5px solid var(--cream3);flex-shrink:0;background:var(--cream2)}
.panel-head h3{font-size:13px;font-weight:600;color:var(--brown)}
.toolbar{display:flex;gap:8px;padding:8px 10px;border-bottom:1.5px solid var(--cream3);flex-shrink:0;align-items:center;background:var(--cream2)}
.srch{width:100%;padding:6px 10px;background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r);color:var(--brown);font-size:13px}
.srch:focus{outline:none;border-color:var(--accent-mid)}
.srch::placeholder{color:var(--brown4)}
.type-sel{padding:6px 10px;background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r);color:var(--brown);font-size:12px;cursor:pointer}

/* ── DRAWER ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(61,43,31,.3);z-index:90;backdrop-filter:blur(2px)}
.overlay.open{display:block}
.drawer{position:fixed;right:-480px;top:0;width:460px;height:100vh;background:var(--cream);border-left:1.5px solid var(--cream3);z-index:100;transition:right .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(61,43,31,.12)}
.drawer.open{right:0}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1.5px solid var(--cream3);flex-shrink:0;background:var(--cream2)}
.drawer-head h3{font-size:15px;color:var(--brown)}
.drawer-close{background:var(--cream);border:1.5px solid var(--cream3);border-radius:6px;color:var(--brown3);cursor:pointer;padding:3px 8px;font-size:14px}
.drawer-body{padding:20px;flex:1}
.dr{margin-bottom:15px}
.dr .dl{font-size:10px;font-weight:700;color:var(--brown4);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.dr .dv{font-size:14px;color:var(--brown)}
.dr .dv.big{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--green)}
.dr-div{border:none;border-top:1px solid var(--cream3);margin:14px 0}
.raw-box{background:var(--cream2);border:1px solid var(--cream3);border-radius:var(--r);padding:10px;font-size:11px;color:var(--brown3);font-family:'DM Mono',monospace;line-height:1.8;white-space:pre-wrap;word-break:break-word;max-height:160px;overflow-y:auto}
.ai-box{background:var(--accent-light);border:1px solid var(--accent-mid);border-radius:var(--r);padding:12px;font-size:13px;color:var(--brown);line-height:1.7;margin-top:4px}
.reply-area{width:100%;padding:9px 12px;background:var(--cream2);border:1.5px solid var(--cream3);border-radius:var(--r);color:var(--brown);font-size:13px;resize:vertical;min-height:80px;margin-top:8px}
.reply-area:focus{outline:none;border-color:var(--accent-mid)}
.btn-reply{margin-top:8px;padding:8px 16px;background:var(--accent);border:none;border-radius:var(--r);color:var(--cream);font-size:13px;font-weight:600;cursor:pointer}
.btn-reply:hover{background:var(--accent2)}
.reply-ok{color:var(--green);font-size:12px;font-weight:500;margin-top:5px;display:none}

/* ── CLIENT 360 ── */
.c360-wrap{display:grid;grid-template-columns:270px 1fr;gap:14px;height:calc(100vh - 128px)}
.c360-left{background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.c360-av{width:50px;height:50px;border-radius:50%;background:var(--accent-light);border:2px solid var(--accent-mid);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;flex-shrink:0}
.c360-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--brown)}
.c360-ph{font-size:11px;color:var(--brown4);font-family:'DM Mono',monospace}
.if-lbl{font-size:10px;font-weight:600;color:var(--brown4);text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.if-val{font-size:13px;color:var(--brown)}
.c-act-btn{padding:7px 10px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--cream3);background:var(--cream2);color:var(--brown2);width:100%;margin-bottom:5px;transition:all .12s}
.c-act-btn:hover{border-color:var(--accent-mid);color:var(--accent);background:var(--accent-light)}
.c-act-btn.pri{background:var(--accent);color:var(--cream);border-color:var(--accent)}
.c-act-btn.pri:hover{background:var(--accent2)}
.tab-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.tab-b{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--cream3);background:var(--cream);color:var(--brown3);transition:all .12s;white-space:nowrap}
.tab-b.active{background:var(--accent);color:var(--cream);border-color:var(--accent)}
.tab-b:hover:not(.active){border-color:var(--accent-mid);color:var(--brown)}
.tab-pane{background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow);flex:1}

/* ── DOC GRID ── */
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:12px}
.doc-card{background:var(--cream2);border:1.5px solid var(--cream3);border-radius:var(--r-lg);padding:12px;cursor:pointer;transition:all .15s}
.doc-card:hover{border-color:var(--accent-mid);box-shadow:var(--shadow-md)}
.doc-icon{font-size:24px;margin-bottom:6px}
.doc-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--brown)}
.doc-type{font-size:10px;color:var(--brown4)}

/* ── MODAL ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(61,43,31,.4);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-ov.open{display:flex}
.modal{background:var(--cream);border-radius:var(--r-lg);padding:24px;width:100%;max-width:500px;box-shadow:var(--shadow-lg);border:1.5px solid var(--cream3);max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;color:var(--brown);margin-bottom:16px}
.mf{margin-bottom:13px}
.mf label{display:block;font-size:11px;font-weight:600;color:var(--brown3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.mf input,.mf select,.mf textarea{width:100%;padding:8px 11px;background:var(--cream2);border:1.5px solid var(--cream3);border-radius:var(--r);color:var(--brown);font-size:13px;transition:border-color .12s}
.mf input:focus,.mf select:focus,.mf textarea:focus{outline:none;border-color:var(--accent-mid)}
.mf textarea{min-height:70px;resize:vertical}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal-cancel{padding:8px 16px;border-radius:var(--r);font-size:13px;cursor:pointer;border:1.5px solid var(--cream3);background:var(--cream2);color:var(--brown3)}
.modal-save{padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;background:var(--accent);border:none;color:var(--cream)}

/* ── UPLOAD ZONE ── */
.upload-zone{border:2px dashed var(--cream4);border-radius:var(--r-lg);padding:24px;text-align:center;cursor:pointer;transition:all .15s;background:var(--cream2)}
.upload-zone:hover{border-color:var(--accent-mid);background:var(--accent-light)}
.upload-zone p{font-size:13px;color:var(--brown3);margin-top:5px}
.progress-bar{height:5px;background:var(--cream3);border-radius:3px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;width:0%}
.progress-txt{font-size:12px;color:var(--brown3);margin-top:7px;text-align:center}

/* ── CLIENT DASHBOARD HEADER ── */
.cdash-head{background:linear-gradient(135deg,#8b4513 0%,#6d3410 100%);border-radius:var(--r-lg);padding:20px;color:var(--cream);margin-bottom:14px;box-shadow:var(--shadow-md)}
.cdash-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:white;margin-bottom:3px}
.cdash-meta{font-size:12px;color:rgba(255,240,220,.65)}
.cdash-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
.cdash-stat{background:rgba(255,255,255,.12);border-radius:var(--r);padding:10px;text-align:center}
.cdash-stat-val{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:white}
.cdash-stat-lbl{font-size:10px;color:rgba(255,240,220,.55);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* ── SPEND BARS ── */
.spend-card{background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow)}
.spend-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.spend-lbl{font-size:13px;font-weight:500;color:var(--brown);width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spend-track{flex:1;height:9px;background:var(--cream3);border-radius:5px;overflow:hidden}
.spend-fill{height:100%;border-radius:5px;transition:width .5s}
.spend-amt{font-size:13px;font-weight:600;color:var(--brown2);font-family:'DM Mono',monospace;width:72px;text-align:right;flex-shrink:0}
.spend-pct{font-size:12px;color:var(--brown4);width:28px;text-align:right;flex-shrink:0}

/* ── TXN COLORS ── */
.cat-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;cursor:pointer}
.cat-fuel{background:#fef3dc;color:#b5720a}.cat-groceries{background:#e8f5ee;color:#2d6a4f}
.cat-salary{background:#e8f0f8;color:#1a3a5c}.cat-rent{background:#f0eaf8;color:#4a2070}
.cat-office{background:#fdecea;color:#8b1a1a}.cat-travel{background:#e8edff;color:#3b5bdb}
.cat-medical{background:#fff0e8;color:#8b4513}.cat-utilities{background:#f0f8e8;color:#3d6b1f}
.cat-gst{background:#fef3dc;color:#8b6010}.cat-tds{background:#f8e8f0;color:#6b1a50}
.cat-entertainment{background:#e8f8f8;color:#1a6b6b}.cat-bank_charges{background:#f4f4f4;color:#555}
.cat-suspense{background:#fff0e0;color:#c05000}.cat-insurance{background:#e8f0e8;color:#2d502d}
.cat-other,.cat-business_income,.cat-refund,.cat-transfer{background:#f0f0f0;color:#666}
.txn-debit{color:var(--red);font-family:'DM Mono',monospace;font-size:12px;font-weight:600}
.txn-credit{color:var(--green);font-family:'DM Mono',monospace;font-size:12px;font-weight:600}

/* ── COMING SOON ── */
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 24px;text-align:center}
.coming-soon h3{font-size:16px;color:var(--brown);margin-bottom:7px}
.coming-soon p{font-size:13px;color:var(--brown4);max-width:280px;line-height:1.7}
.soon-tag{display:inline-block;margin-top:10px;padding:4px 12px;background:var(--accent-light);color:var(--accent);border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--accent-mid)}
</style>
</head>

<script>
// ── SUPABASE ──
const SB_URL='https://luljdeuhpldtjnbcdwgo.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1bGpkZXVocGxkdGpuYmNkd2dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2ODYwMzEsImV4cCI6MjA4OTI2MjAzMX0.OjaFweTgBsnXtynuYuvGK27UjFSEPAhB9XHh1TQwXIU';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

// ── STATE ──
let invoices=[],clients=[],questions=[],appointments=[],documents=[],reminders=[],caInvoices=[],challans=[],transactions=[],bankStatements=[],customEvents=[];
let currentView='home', selectedClient=null;

// ── AUTH ──
async function doLogin(){
  var btn=document.getElementById('login-btn');
  var err=document.getElementById('login-err');
  var email=document.getElementById('login-email').value.trim();
  var pass=document.getElementById('login-password').value;
  err.textContent='';
  if(!email||!pass){err.textContent='Please fill in both fields';return;}
  btn.textContent='Signing in...';btn.disabled=true;
  var res=await sb.auth.signInWithPassword({email:email,password:pass});
  btn.textContent='Sign in to Dashboard';btn.disabled=false;
  if(res.error){err.textContent=res.error.message;return;}
  bootApp(res.data.user);
}

async function doLogout(){
  await sb.auth.signOut();
  document.getElementById('app').classList.remove('show');
  document.getElementById('login-page').style.display='flex';
}

function bootApp(user){
  document.getElementById('login-page').style.display='none';
  document.getElementById('app').classList.add('show');
  var email=user.email||'';
  var initials=email.slice(0,2).toUpperCase();
  document.getElementById('user-av').textContent=initials;
  document.getElementById('user-nm').textContent=email.split('@')[0];
  document.getElementById('sb-av').textContent=initials;
  document.getElementById('sb-email').textContent=email;
  loadData();
}

// ── DATA ──
async function loadData(){
  setPage('<div class="spin-wrap"><div class="spinner"></div></div>');
  try{
    var r=await Promise.all([
      sb.from('invoices').select('*').order('received_at',{ascending:false}),
      sb.from('questions').select('*').order('created_at',{ascending:false}),
      sb.from('appointments').select('*').order('created_at',{ascending:false}),
      sb.from('documents').select('*').order('created_at',{ascending:false}),
      sb.from('reminders').select('*').order('due_date',{ascending:true}),
      sb.from('ca_invoices').select('*').order('created_at',{ascending:false}),
      sb.from('challans').select('*').order('created_at',{ascending:false}),
      sb.from('clients').select('*').order('name',{ascending:true})
    ]);
    invoices=r[0].data||[];questions=r[1].data||[];appointments=r[2].data||[];
    documents=r[3].data||[];reminders=r[4].data||[];caInvoices=r[5].data||[];challans=r[6].data||[];
    var dbC=r[7].data||[];
    var phones=[...new Set(dbC.map(function(c){return c.phone;}).filter(Boolean))];
    clients=phones.map(function(phone){
      var db=dbC.find(function(c){return c.phone===phone;})||{};
      var last=invoices.filter(function(i){return i.client_phone===phone;})[0];
      var lastSeen=last?last.received_at:null;
      var days=lastSeen?Math.floor((Date.now()-new Date(lastSeen))/(864e5)):999;
      return{phone:phone,id:db.id||null,name:db.name||null,business_name:db.business_name||null,
        email:db.email||null,pan_number:db.pan_number||null,gst_number:db.gst_number||null,
        address:db.address||null,notes:db.notes||null,is_active:db.is_active!==false,
        count:invoices.filter(function(i){return i.client_phone===phone;}).length,
        lastSeen:lastSeen,days:days,
        total:invoices.filter(function(i){return i.client_phone===phone;}).reduce(function(s,i){return s+(parseFloat(i.amount)||0);},0),
        health:days<14?'active':days<30?'quiet':'inactive'};
    }).sort(function(a,b){return (a.name||a.phone).localeCompare(b.name||b.phone);});
  }catch(e){
    setPage('<div class="empty" style="margin-top:80px"><div class="empty-icon">⚠️</div><p style="color:var(--red)">Error loading: '+e.message+'</p><br><button class="btn-sm" onclick="loadData()">Retry</button></div>');
    return;
  }
  // Load new tables (optional - won't break if missing)
  try{var tr=await sb.from('transactions').select('*').order('transaction_date',{ascending:false});transactions=tr.data||[];}catch(e){transactions=[];}
  try{var br=await sb.from('bank_statements').select('*').order('created_at',{ascending:false});bankStatements=br.data||[];}catch(e){bankStatements=[];}
  customEvents=JSON.parse(localStorage.getItem('taxnio_events')||'[]');
  updateBadges();
  populateDrop();
  renderView();
}

function cName(phone){if(!phone)return'—';var c=clients.find(function(x){return x.phone===phone;});return c&&c.name?c.name:phone;}
function updateBadges(){
  var pq=questions.filter(function(q){return q.needs_ca_review&&q.status!=='ca_replied';}).length;
  var pa=appointments.filter(function(a){return a.status==='pending';}).length;
  var qb=document.getElementById('qna-badge');var ab=document.getElementById('appt-badge');
  if(qb){qb.textContent=pq;qb.style.display=pq>0?'inline':'none';}
  if(ab){ab.textContent=pa;ab.style.display=pa>0?'inline':'none';}
  document.getElementById('notif-dot').style.display=(pq+pa)>0?'block':'none';
}
function populateDrop(){
  var dd=document.getElementById('client-dropdown');
  var val=dd.value;
  dd.innerHTML='<option value="">All Clients</option>';
  clients.forEach(function(c){
    var o=document.createElement('option');
    o.value=c.phone;
    o.textContent=c.name?c.name+' ('+c.phone+')':c.phone;
    dd.appendChild(o);
  });
  if(val)dd.value=val;
}
function onClientSelect(phone){
  if(phone){
    selectedClient=clients.find(function(c){return c.phone===phone;})||{phone:phone};
    // Stay on current page but refresh with client filter
    // Only go to client-dash if on home or no specific page
    if(currentView==='home'){
      nav('client-dash');
    } else {
      // Stay on current view, just re-render with selected client
      renderView();
    }
  }else{
    selectedClient=null;
    renderView();
  }
}
function onGlobalSearch(val){
  if(!val)return;
  nav('receipts');
  setTimeout(function(){var i=document.querySelector('.srch');if(i){i.value=val;renderReceipts(val,'');}},120);
}

  var hr=new Date().getHours();
  var gr=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  var T={
    home:['Overview',gr+' — here is your daily briefing'],
    'client-dash':['Client Dashboard','Selected client overview and spending'],
    clients:['Manage Clients','Add, edit and delete clients'],
    receipts:['Receipts','All invoices and receipts from clients'],
    qna:['Q&A Inbox','Client questions and AI answers'],
    appointments:['Appointments','Meeting requests from clients'],
    documents:['Documents','Client documents and files'],
    reminders:['Reminders','Client reminders and follow-ups'],
    'ca-invoices':['CA Invoices','Invoices raised to clients'],
    challans:['Challans','Tax challans and payments'],
    'bank-statements':['Bank Statements','Upload and manage bank statements'],
    transactions:['Transactions','All categorised bank transactions'],
    spending:['Spending Analysis','AI-powered expense breakdown by category'],

  if(v==='challans')pa.innerHTML='<button class="btn-pri" onclick="openModal(\'challan\')">+ New Challan</button>';

  if(v==='bank-statements')pa.innerHTML='<button class="btn-pri" onclick="openModal(\'upload-bank\')">+ Upload Statement</button>';
  if(v==='transactions')pa.innerHTML='<button class="btn-sm" onclick="exportTxnCSV()">↓ Export CSV</button>';
  renderView();
}
function renderView(){
  if(currentView==='home')renderHome();

  else if(currentView==='receipts')renderReceipts('','');
  else if(currentView==='qna')renderQnA('','');
  else if(currentView==='appointments')renderAppointments('');
  else if(currentView==='documents')renderDocuments('');
  else if(currentView==='reminders')renderReminders();
  else if(currentView==='ca-invoices')renderCAInvoices();
  else if(currentView==='challans')renderChallans();

}

// ── COMPLIANCE DATES ──
function getComplianceDates(){
  var now=new Date(),m=now.getMonth(),y=now.getFullYear();
  var nm=m===11?0:m+1,ny=m===11?y+1:y;
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var dates=[];
  function add(d,mo,yr,name,desc){
    var dt=new Date(yr,mo,d);
    var diff=Math.floor((dt-now)/864e5);
    dates.push({date:d+' '+months[mo]+' '+yr,name:name,desc:desc,diff:diff});
  }
  add(7,m,y,'TDS Payment','Deposit TDS deducted in previous month');
  add(11,m,y,'GSTR-1 Filing','Monthly sales return');
  add(20,m,y,'GSTR-3B Filing','Summary GST return & pay tax');
  add(7,nm,ny,'TDS Payment (Next)','Next month TDS deposit');
  add(11,nm,ny,'GSTR-1 (Next)','Next month sales return');
  if([2,5,8,11].indexOf(m)>=0)add(31,m,y,'TDS Quarterly Return','File TDS return for quarter');
  if(m===2)add(31,m,y,'Professional Tax Maharashtra','Annual PT return');
  if([5,8,11,2].indexOf(m)>=0)add(15,m,y,'Advance Tax','Pay advance tax instalment');
  return dates.filter(function(d){return d.diff>=-1&&d.diff<=45;}).sort(function(a,b){return a.diff-b.diff;});
}

// ── MANAGE CLIENTS ──
function renderClients(){
  setPage('<div class="panel" style="height:calc(100vh - 128px)">'
    +'<div class="panel-head"><h3>All Clients</h3><span>'+clients.length+'</span></div>'
    +'<div class="toolbar"><input class="srch" style="flex:1" placeholder="Search name, phone, PAN, GST..." oninput="filterCli(this.value)"></div>'
    +'<div class="tbl-wrap" id="cli-tbl">'+renderCliTable(clients)+'</div></div>');
}
function filterCli(s){var f=s?clients.filter(function(c){return (c.name||'').toLowerCase().includes(s.toLowerCase())||(c.phone||'').includes(s)||(c.pan_number||'').toLowerCase().includes(s.toLowerCase())||(c.gst_number||'').toLowerCase().includes(s.toLowerCase());;}):clients;var w=document.getElementById('cli-tbl');if(w)w.innerHTML=renderCliTable(f);}
function renderCliTable(data){
  if(!data||!data.length)return'<div class="empty"><div class="empty-icon">👥</div><p>No clients. Click + Add Client to start.</p></div>';
  return'<table><thead><tr><th>Name</th><th>Phone</th><th>Business</th><th>PAN</th><th>Health</th><th>Rcpts</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead><tbody>'
  +data.map(function(c){
    return'<tr onclick="onClientSelect(\''+c.phone+'\')">'
      +'<td style="font-weight:500">'+(c.name||'—')+'</td>'
      +'<td class="mono">'+(c.phone||'—')+'</td>'
      +'<td class="desc-cell">'+(c.business_name||'—')+'</td>'
      +'<td class="mono">'+(c.pan_number||'—')+'</td>'
      +'<td><span style="display:inline-flex;align-items:center;gap:4px;font-size:11px"><div style="width:7px;height:7px;border-radius:50%;background:'+(c.health==='active'?'#27ae60':c.health==='quiet'?'#f39c12':'#c0392b')+'"></div>'+c.health+'</span></td>'
      +'<td style="text-align:center">'+c.count+'</td>'
      +'<td class="amt">₹'+fmtN(c.total)+'</td>'
      +'<td><span class="badge '+(c.is_active?'b-active':'b-inactive')+'">'+(c.is_active?'Active':'Inactive')+'</span></td>'
      +'<td onclick="event.stopPropagation()" style="white-space:nowrap">'
      +'<button onclick="openModal(\'edit-client\',\''+c.phone+'\')" style="padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid var(--cream3);background:var(--cream2);color:var(--brown2);margin-right:4px">Edit</button>'
      +'<button onclick="delClient(\''+c.phone+'\')" style="padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid var(--red-light);background:var(--red-light);color:var(--red)">Delete</button>'
      +'</td></tr>';
  }).join('')+'</tbody></table>';
}
function selClientGo(ph){selectedClient=clients.find(function(c){return c.phone===ph;});document.getElementById('client-dropdown').value=ph;nav('client-dash');}

// ── RECEIPTS ──
function renderReceipts(s,t){
  var inv=selectedClient?invoices.filter(function(i){return i.client_phone===selectedClient.phone;}):invoices;
  if(t)inv=inv.filter(function(i){return i.message_type===t;});
  if(s)inv=inv.filter(function(i){return (i.vendor_name||'').toLowerCase().includes(s.toLowerCase())||(i.client_phone||'').includes(s)||(i.description||'').toLowerCase().includes(s.toLowerCase());});
  setPage('<div class="panel" style="height:calc(100vh - 128px)">'
    +'<div class="panel-head"><h3>Receipts</h3><span>'+inv.length+' of '+invoices.length+'</span></div>'
    +'<div class="toolbar"><input class="srch" style="flex:1" placeholder="Search vendor, client..." value="'+s+'" oninput="renderReceipts(this.value,document.getElementById(\'rt-sel\').value)">'
    +'<select class="type-sel" id="rt-sel" onchange="renderReceipts(document.querySelector(\'.srch\').value,this.value)"><option value="">All</option><option value="receipt">Receipt</option><option value="invoice">Invoice</option><option value="expense">Expense</option></select>'
    +'</div><div class="tbl-wrap">'+renderRcptTable(inv)+'</div></div>');
}
function renderRcptTable(data){
  if(!data||!data.length)return'<div class="empty"><div class="empty-icon">📭</div><p>No receipts found</p></div>';
  return'<table><thead><tr><th>Date</th><th>Client</th><th>Type</th><th>Vendor</th><th>Amount</th><th>Description</th></tr></thead><tbody>'
  +data.map(function(i){
    return'<tr onclick="openRcptDrawer(\''+i.id+'\')">'
      +'<td class="mono">'+fmtD(i.received_at)+'</td>'
      +'<td style="color:var(--brown3)">'+cName(i.client_phone||'')+'</td>'
      +'<td><span class="badge b-'+(i.message_type||'receipt')+'">'+(i.message_type||'receipt').replace('_',' ')+'</span></td>'
      +'<td style="font-weight:500">'+(i.vendor_name||'—')+'</td>'
      +'<td class="amt">'+(i.amount?'₹'+fmtN(parseFloat(i.amount)):'—')+'</td>'
      +'<td class="desc-cell">'+(i.description||i.raw_text||'—')+'</td></tr>';
  }).join('')+'</tbody></table>';
}

// ── Q&A ──
function renderQnA(s,f){
  var qs=selectedClient?questions.filter(function(q){return q.client_phone===selectedClient.phone;}):questions;
  if(f==='review')qs=qs.filter(function(q){return q.needs_ca_review;});
  if(f==='answered')qs=qs.filter(function(q){return !q.needs_ca_review;});
  if(s)qs=qs.filter(function(q){return (q.question||'').toLowerCase().includes(s.toLowerCase());});
  setPage('<div class="panel" style="height:calc(100vh - 128px)">'
    +'<div class="panel-head"><h3>Q&A Inbox</h3><span>'+qs.length+'</span></div>'
    +'<div class="toolbar"><input class="srch" style="flex:1" placeholder="Search questions..." value="'+s+'" oninput="renderQnA(this.value,document.getElementById(\'qf-sel\').value)">'
    +'<select class="type-sel" id="qf-sel" onchange="renderQnA(document.querySelector(\'.srch\').value,this.value)"><option value="">All</option><option value="review">Needs review</option><option value="answered">Answered</option></select>'
    +'</div><div style="overflow-y:auto;flex:1">'
    +(qs.length===0?'<div class="empty"><div class="empty-icon">💬</div><p>No questions yet</p></div>':
      qs.map(function(q){
        return'<div style="padding:11px 14px;border-bottom:1px solid var(--cream3);cursor:pointer" onclick="openQnADrawer(\''+q.id+'\')">'
          +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">'
          +'<span class="badge '+(q.needs_ca_review?'b-review':'b-answered')+'">'+(q.needs_ca_review?'Needs review':'AI answered')+'</span>'
          +'<span style="font-size:11px;color:var(--brown4)">'+cName(q.client_phone||'')+'</span>'
          +'<span style="margin-left:auto;font-size:10px;color:var(--brown4)">'+fmtD(q.created_at)+'</span></div>'
          +'<div style="font-size:13px;font-weight:500;color:var(--brown)">'+(q.question||'—')+'</div>'
          +'<div style="font-size:12px;color:var(--brown3);margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+(q.ai_answer||q.ca_reply||'No answer yet')+'</div></div>';
      }).join('')
    )+'</div></div>');
}

// ── TRANSACTIONS ──
var txnActiveCat='', txnSearch='', txnDateFrom='', txnDateTo='';

function renderTransactions(s,cat,dateFrom,dateTo){
  // Update filter state
  if(s!==undefined)txnSearch=s||'';
  if(cat!==undefined)txnActiveCat=cat||'';
  if(dateFrom!==undefined)txnDateFrom=dateFrom||'';
  if(dateTo!==undefined)txnDateTo=dateTo||'';

  var t=selectedClient?transactions.filter(function(x){return x.client_phone===selectedClient.phone;}):transactions;
  if(txnActiveCat)t=t.filter(function(x){return (x.ca_category||x.category)===txnActiveCat;});
  if(txnSearch)t=t.filter(function(x){return (x.description||'').toLowerCase().includes(txnSearch.toLowerCase());});
  if(txnDateFrom)t=t.filter(function(x){return x.transaction_date&&x.transaction_date>=txnDateFrom;});
  if(txnDateTo)t=t.filter(function(x){return x.transaction_date&&x.transaction_date<=txnDateTo;});

  var cats=['suspense','fuel','groceries','salary','rent','office','travel','medical','utilities','gst','tds','entertainment','bank_charges','insurance','other'];
  var catIcons={suspense:'❓',fuel:'⛽',groceries:'🛒',salary:'💼',rent:'🏠',office:'🖥️',travel:'✈️',medical:'🏥',utilities:'💡',gst:'📋',tds:'📊',entertainment:'🎬',bank_charges:'🏦',insurance:'🛡️',other:'📌'};

  // Count per category for chips
  var allT=selectedClient?transactions.filter(function(x){return x.client_phone===selectedClient.phone;}):transactions;
  var catCounts={};
  cats.forEach(function(c){
    catCounts[c]=allT.filter(function(x){return (x.ca_category||x.category)===c;}).length;
  });

  var chips='<div style="display:flex;gap:8px;flex-wrap:wrap;padding:14px 16px;border-bottom:1.5px solid var(--cream3);background:var(--cream2)">';
  // All chip
  chips+='<button onclick="renderTransactions(txnSearch,'',txnDateFrom,txnDateTo)" style="padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid '+(txnActiveCat===''?'var(--accent)':'var(--cream3)')+';background:'+(txnActiveCat===''?'var(--accent-light)':'var(--cream)')+';color:'+(txnActiveCat===''?'var(--accent)':'var(--brown2)')+'">All ('+allT.length+')</button>';
  cats.forEach(function(c){
    if(catCounts[c]===0)return;
    var isActive=txnActiveCat===c;
    var isSuspense=c==='suspense';
    chips+='<button onclick="renderTransactions(txnSearch,''+c+'',txnDateFrom,txnDateTo)" style="padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid '+(isActive?'var(--accent)':isSuspense?'#e0c090':'var(--cream3)')+';background:'+(isActive?'var(--accent-light)':isSuspense?'#fef8ec':'var(--cream)')+';color:'+(isActive?'var(--accent)':isSuspense?'#8b6010':'var(--brown2)')+'">'+catIcons[c]+' '+c.replace('_',' ')+' ('+catCounts[c]+')</button>';
  });
  chips+='</div>';

  var toolbar='<div class="toolbar" style="gap:10px">'
    +'<input class="srch" style="flex:1;font-size:14px" placeholder="Search description..." value="'+txnSearch+'" oninput="renderTransactions(this.value,txnActiveCat,txnDateFrom,txnDateTo)">'
    +'<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">'
    +'<span style="font-size:13px;color:var(--brown4);white-space:nowrap">Date from</span>'
    +'<input type="date" value="'+txnDateFrom+'" onchange="renderTransactions(txnSearch,txnActiveCat,this.value,txnDateTo)" style="padding:6px 10px;border-radius:var(--r);border:1.5px solid var(--cream3);background:var(--cream);color:var(--brown);font-size:13px;cursor:pointer">'
    +'<span style="font-size:13px;color:var(--brown4)">to</span>'
    +'<input type="date" value="'+txnDateTo+'" onchange="renderTransactions(txnSearch,txnActiveCat,txnDateFrom,this.value)" style="padding:6px 10px;border-radius:var(--r);border:1.5px solid var(--cream3);background:var(--cream);color:var(--brown);font-size:13px;cursor:pointer">'
    +(txnDateFrom||txnDateTo?'<button onclick="renderTransactions(txnSearch,txnActiveCat,'','')" style="padding:6px 10px;border-radius:var(--r);border:1.5px solid var(--cream3);background:var(--red-light);color:var(--red);font-size:12px;cursor:pointer;white-space:nowrap">✕ Clear</button>':'')
    +'</div>'
    +'</div>';

  setPage('<div class="panel" style="height:calc(100vh - 128px)">'
    +'<div class="panel-head"><h3>Transactions'+(txnActiveCat?' — '+txnActiveCat.replace('_',' '):'')+'</h3>'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +(txnActiveCat||txnSearch||txnDateFrom?'<span style="font-size:13px;color:var(--brown4)">'+t.length+' results</span>':'')
    +'<span class="card-cnt">'+allT.length+' total</span>'
    +(t.length>0?'<button class="btn-sm" onclick="exportTxnCSV()">↓ Export</button>':'')
    +'</div></div>'
    +chips
    +toolbar
    +'<div class="tbl-wrap">'
    +(t.length===0?'<div class="empty"><div class="empty-icon">💳</div><p>'+(allT.length===0?'No transactions yet. Upload a bank statement to get started.':'No transactions match your filters.')+'</p></div>':
      '<table><thead><tr><th>Date</th><th>'+(selectedClient?'':'Client')+'</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th><th>Balance</th></tr></thead><tbody>'
      +t.map(function(x){
        var cat=x.ca_category||x.category||'other';
        var isSus=cat==='suspense';
        return'<tr style="'+(isSus?'background:#fffbf0;':'')+'">'
          +'<td class="mono" style="font-size:13px">'+(x.transaction_date||'—')+'</td>'
          +(selectedClient?'':'<td style="font-size:13px">'+cName(x.client_phone||'')+'</td>')
          +'<td style="font-size:13px;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(x.description||'—')+'</td>'
          +'<td><span class="cat-badge cat-'+cat+'" onclick="changeCat(''+x.id+'')" title="Click to change category">'+catIcons[cat]+' '+cat.replace('_',' ')+'</span>'+(isSus?'<span style="font-size:11px;color:#8b6010;margin-left:4px">⚠️</span>':'')+'</td>'
          +'<td><span class="badge '+(x.type==='credit'?'b-answered':'b-unpaid')+'" style="font-size:12px">'+(x.type||'—')+'</span></td>'
          +'<td class="'+(x.type==='credit'?'txn-credit':'txn-debit')+'" style="font-size:14px;font-weight:700">'+(x.type==='credit'?'+':'−')+'₹'+fmtN(parseFloat(x.amount)||0)+'</td>'
          +'<td class="mono" style="font-size:13px;color:var(--brown4)">'+(x.balance?'₹'+fmtN(parseFloat(x.balance)):'—')+'</td></tr>';
      }).join('')+'</tbody></table>'
    )+'</div></div>');
}

  var catColors={fuel:'#e8920a',groceries:'#27ae60',salary:'#1a3a5c',rent:'#4a2070',office:'#8b1a1a',travel:'#3b5bdb',medical:'#8b4513',utilities:'#3d6b1f',gst:'#8b6010',tds:'#6b1a50',entertainment:'#1a6b6b',bank_charges:'#555',suspense:'#c05000',insurance:'#2d502d',other:'#888'};
  var catIcons={fuel:'⛽',groceries:'🛒',salary:'💼',rent:'🏠',office:'🖥️',travel:'✈️',medical:'🏥',utilities:'💡',gst:'📋',tds:'📊',entertainment:'🎬',bank_charges:'🏦',suspense:'❓',insurance:'🛡️',other:'📌'};

  +(arr.length===0?'<div class="empty"><div class="empty-icon">📊</div><p>No transaction data yet. Upload a bank statement.</p><button class="btn-pri" style="margin-top:12px" onclick="openModal(\'upload-bank\')">+ Upload Statement</button></div>':
    arr.map(function(e){

        +'<div class="spend-track"><div class="spend-fill" style="width:'+Math.round(e[1]/total*100)+'%;background:'+(catColors[e[0]]||'#888')+'"></div></div>'
        +'<div class="spend-amt">₹'+fmtN(e[1])+'</div><div class="spend-pct">'+Math.round(e[1]/total*100)+'%</div></div>';
    }).join('')
  )+'</div>'
  +'<div style="display:flex;flex-direction:column;gap:10px">'
  +'<div class="spend-card" style="text-align:center"><div style="font-size:10px;color:var(--brown4);text-transform:uppercase;margin-bottom:6px">Total Debits</div><div style="font-family:\'Playfair Display\',serif;font-size:26px;font-weight:700;color:var(--red)">₹'+fmtN(total)+'</div><div style="font-size:11px;color:var(--brown4);margin-top:3px">'+t.length+' transactions</div></div>'
  +(suspCount>0?'<div class="spend-card" style="border-color:#e0c090;background:#fef8ec;text-align:center;cursor:pointer" onclick="renderTransactions(\'\',\'suspense\')"><div style="font-size:22px;margin-bottom:5px">⚠️</div><div style="font-size:13px;font-weight:600;color:#8b6010">'+suspCount+' Suspense Entries</div><div style="font-size:11px;color:#a07820;margin-top:3px">Click to review</div></div>':'')
  +'<button class="btn-pri" style="padding:10px" onclick="openModal(\'upload-bank\')">+ Upload Bank Statement</button>'
  +'</div></div>'
  +'<div class="card"><div class="card-head"><h3>Category Table</h3></div>'
  +'<table><thead><tr><th>Category</th><th>Transactions</th><th>Total</th><th>% of Spend</th></tr></thead><tbody>'
  +arr.map(function(e){
    return'<tr onclick="renderTransactions(\'\',\''+e[0]+'\')">'
      +'<td><span class="cat-badge cat-'+e[0]+'">'+(catIcons[e[0]]||'📌')+' '+e[0].replace('_',' ')+'</span></td>'
      +'<td style="text-align:center">'+t.filter(function(x){return (x.ca_category||x.category)===e[0];}).length+'</td>'
      +'<td class="amt">₹'+fmtN(e[1])+'</td>'
      +'<td><div style="display:flex;align-items:center;gap:7px"><div style="flex:1;height:5px;background:var(--cream3);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+Math.round(e[1]/total*100)+'%;background:'+(catColors[e[0]]||'#888')+';border-radius:3px"></div></div><span style="font-size:11px;color:var(--brown4);width:28px">'+Math.round(e[1]/total*100)+'%</span></div></td></tr>';
  }).join('')+'</tbody></table></div>'
  );
}

function renderTally(){

    +'<div class="card"><div class="card-head"><h3>Import Tally Backup</h3></div>'
    +'<div style="padding:20px">'
    +'<p style="font-size:13px;color:var(--brown3);margin-bottom:16px;line-height:1.7">Upload your Tally backup file (.tbk) or XML export. System will process it within 24 hours and populate your dashboard.</p>'
    +'<div class="upload-zone" onclick="document.getElementById(\'tally-file\').click()">'
    +'<div style="font-size:32px;margin-bottom:6px">📊</div>'
    +'<p style="font-weight:600;color:var(--brown)">Click to upload Tally file</p>'
    +'<p>.tbk · .xml · .xlsx · .csv supported</p>'
    +'<input type="file" id="tally-file" style="display:none" accept=".tbk,.xml,.xlsx,.csv,.xls" onchange="uploadTally(this)">'
    +'</div>'
    +'<div style="background:var(--cream2);border-radius:var(--r);padding:14px;margin-top:14px;font-size:13px;color:var(--brown3);line-height:1.8;border:1px solid var(--cream3)">'
    +'<strong style="color:var(--brown)">How to export from Tally:</strong><br>'
    +'1. Open Tally → Gateway of Tally<br>2. Press Alt+E for Export<br>3. Select XML format → Choose date range<br>4. Export the file → Upload it here'
    +'</div></div></div></div>');
}
async function uploadTally(input){
  if(!input.files||!input.files[0])return;
  var f=input.files[0];
  var fn='tally_'+Date.now()+'_'+f.name;
  await sb.storage.from('documents').upload('tally/'+fn,f,{contentType:f.type});
  var url=SB_URL+'/storage/v1/object/public/documents/tally/'+fn;
  await sb.from('documents').insert({doc_type:'tally_backup',file_name:f.name,file_url:url,summary:'Tally backup — processing scheduled',status:'pending'});
  alert('Uploaded successfully! Will be processed within 24 hours.');
}

// ── BANK STATEMENT UPLOAD ──
async function uploadBS(){
  var c=document.getElementById('bs-c').value;
  var bank=document.getElementById('bs-b').value.trim();
  var file=document.getElementById('bs-f').files[0];
  if(!c){alert('Please select a client');return;}
  if(!file){alert('Please select a file');return;}
  document.getElementById('bs-bar').style.display='block';
  document.getElementById('bs-status').style.display='block';
  document.getElementById('bs-fill').style.width='10%';
  document.getElementById('bs-status').textContent='Reading file...';
  document.getElementById('bs-save').disabled=true;
  document.getElementById('bs-save').textContent='Processing...';

  // Step 1: Read file content first
  var reader=new FileReader();
  reader.onload=async function(e){
    var fileContent=e.target.result;
    try{
      document.getElementById('bs-fill').style.width='20%';
      document.getElementById('bs-status').textContent='Saving to database...';

      // Step 2: Create statement record first (no file storage needed)
      var res=await sb.from('bank_statements').insert({
        client_phone:c,
        file_name:file.name,
        file_url:null,
        bank_name:bank||null,
        status:'processing'
      }).select().single();

      if(res.error)throw new Error(res.error.message);

      document.getElementById('bs-fill').style.width='30%';

      // Step 3: Process with Claude via Worker
      await processBS(fileContent,file.name,c,res.data.id);

    }catch(err){
      console.error(err);
      document.getElementById('bs-status').textContent='Error: '+err.message;
      document.getElementById('bs-save').disabled=false;
      document.getElementById('bs-save').textContent='Upload & Process with AI';
    }
  };
  reader.onerror=function(){
    document.getElementById('bs-status').textContent='Error reading file';
    document.getElementById('bs-save').disabled=false;
    document.getElementById('bs-save').textContent='Upload & Process with AI';
  };
  reader.readAsText(file);
}

async function processBS(fileContent, fileName, clientPhone, statementId){
  try{
    document.getElementById('bs-fill').style.width='40%';
    document.getElementById('bs-status').textContent='Sending to Claude AI...';

    // Build the prompt
    var prompt = 'You are an expert Indian CA assistant. Read this bank statement and extract ALL transactions.\n\n'
      + 'Return ONLY a JSON array. No explanation. No markdown. No backticks. Just the array.\n\n'
      + 'Each object in the array must have exactly these fields:\n'
      + '{ "transaction_date": "YYYY-MM-DD", "description": "string", "amount": 100.00, "type": "debit", "balance": 5000.00, "category": "fuel", "needs_review": false }\n\n'
      + 'category must be ONE of: fuel, groceries, salary, rent, office, travel, medical, utilities, gst, tds, entertainment, bank_charges, insurance, other, suspense\n\n'
      + 'Rules for category:\n'
      + 'HPCL/BPCL/IOCL/PETROL = fuel | SWIGGY/ZOMATO/BIGBASKET/DMART/GROCERY = groceries\n'
      + 'SALARY/SAL/PAYROLL/CTC = salary | GST/GSTIN = gst | TDS/INCOME TAX/IT DEPT = tds\n'
      + 'IRCTC/UBER/OLA/AIRLINE/TRAVEL = travel | MEDICAL/PHARMA/HOSPITAL/CLINIC = medical\n'
      + 'ELECTRICITY/WATER/BROADBAND/AIRTEL/JIO/BSNL = utilities | RENT/LEASE = rent\n'
      + 'ATM/CASH = bank_charges | EMI/LOAN/MORTGAGE = other | UPI UNKNOWN = other\n'
      + 'needs_review: true ONLY for suspense entries\n'
      + 'IMPORTANT: When you cannot identify a merchant or transaction type, use "suspense" NOT "other"\n'
      + '"other" is only for known but uncategorised items like bank transfers between own accounts\n\n'
      + 'Bank statement:\n' + fileContent.slice(0, 7000);

    var workerRes = await fetch('https://taxnio-ai.harshalbajaj29.workers.dev', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        content: prompt
      })
    });

    if(!workerRes.ok){
      var errText = await workerRes.text();
      throw new Error('Worker returned ' + workerRes.status + ': ' + errText);
    }

    var workerData = await workerRes.json();
    document.getElementById('bs-fill').style.width='65%';
    document.getElementById('bs-status').textContent='Parsing results...';

    // Debug: log full response
    console.log('Worker response:', JSON.stringify(workerData).slice(0, 500));

    // Extract text from Claude response
    var responseText = '';
    if(workerData.content && Array.isArray(workerData.content) && workerData.content.length > 0){
      responseText = workerData.content[0].text || '';
    } else if(workerData.error){
      throw new Error('Claude error: ' + (workerData.error.message || JSON.stringify(workerData.error)));
    } else {
      throw new Error('Unexpected response: ' + JSON.stringify(workerData).slice(0,200));
    }

    console.log('Response text:', responseText.slice(0, 500));

    // Parse JSON from response
    var txns = [];
    var cleanText = responseText.replace(/```json/g,'').replace(/```/g,'').trim();

    // Try direct parse first
    try {
      txns = JSON.parse(cleanText);
    } catch(e1) {
      // Try to find array in text
      var arrMatch = cleanText.match(/\[[\s\S]*\]/);
      if(arrMatch){
        try { txns = JSON.parse(arrMatch[0]); }
        catch(e2){ txns = []; console.error('Parse failed:', e2.message, arrMatch[0].slice(0,200)); }
      }
    }

    if(!Array.isArray(txns)){
      console.error('txns is not array:', typeof txns, JSON.stringify(txns).slice(0,100));
      txns = [];
    }

    if(txns.length === 0){
      document.getElementById('bs-status').textContent = 'No transactions found. Make sure file is a text CSV not PDF binary.';
      await sb.from('bank_statements').update({status:'error'}).eq('id',statementId);
      document.getElementById('bs-save').disabled = false;
      document.getElementById('bs-save').textContent = 'Upload & Process with AI';
      return;
    }

    document.getElementById('bs-fill').style.width='80%';
    document.getElementById('bs-status').textContent='Saving ' + txns.length + ' transactions...';

    var totC=0, totD=0, sus=0;

    // Save in batches of 50
    for(var i=0; i<txns.length; i+=50){
      var batch = txns.slice(i,i+50).map(function(t){
        var amt = parseFloat(t.amount)||0;
        var typ = (t.type||'debit').toLowerCase().trim();
        if(typ==='credit') totC+=amt; else totD+=amt;
        if((t.category||'')===('suspense')) sus++;
        return {
          client_phone: clientPhone,
          statement_id: statementId,
          transaction_date: t.transaction_date||null,
          description: (t.description||'').slice(0,500),
          amount: amt,
          type: typ,
          category: t.category||'other',
          balance: t.balance ? parseFloat(t.balance) : null,
          needs_review: t.needs_review===true,
          is_approved: false
        };
      });
      var saveRes = await sb.from('transactions').insert(batch);
      if(saveRes.error) console.error('Batch save error:', saveRes.error.message);
    }

    // Update statement
    await sb.from('bank_statements').update({
      status:'done',
      transaction_count: txns.length,
      total_credits: Math.round(totC*100)/100,
      total_debits: Math.round(totD*100)/100
    }).eq('id',statementId);

    document.getElementById('bs-fill').style.width='100%';
    document.getElementById('bs-status').textContent='Done! ' + txns.length + ' transactions categorised. ' + sus + ' in suspense.';
    setTimeout(function(){ closeModal(); loadData(); }, 2500);

  }catch(err){
    console.error('processBS error:', err);
    document.getElementById('bs-status').textContent='Error: ' + err.message;
    document.getElementById('bs-save') && (document.getElementById('bs-save').disabled=false);
    document.getElementById('bs-save') && (document.getElementById('bs-save').textContent='Upload & Process with AI');
    try{ await sb.from('bank_statements').update({status:'error'}).eq('id',statementId); }catch(e){}
  }
}


// ── CATEGORY CHANGE ──
function changeCat(id){openModal('change-cat',id);}
async function saveCat(id,cat){
  if(!cat)return;
  await sb.from('transactions').update({ca_category:cat,needs_review:false}).eq('id',id);
  var t=transactions.find(function(x){return x.id===id;});if(t){t.ca_category=cat;t.needs_review=false;}
  renderView();
}

// ── EXPORT ──
function exportCSV(){
  var h=['Date','Client','Type','Vendor','Amount','GST','Description'];
  var rows=invoices.map(function(i){return[fmtD(i.received_at),cName(i.client_phone||''),i.message_type||'',(i.vendor_name||'').replace(/,/g,' '),i.amount||'',i.gst_amount||'',(i.description||'').replace(/,/g,' ')];});
  var csv=[h].concat(rows).map(function(r){return r.join(',');}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='taxnio_receipts_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
function exportTxnCSV(){
  var h=['Date','Client','Description','Category','CA Category','Type','Amount','Balance'];
  var rows=transactions.map(function(t){return[t.transaction_date||'',cName(t.client_phone||''),(t.description||'').replace(/,/g,' '),t.category||'',t.ca_category||'',t.type||'',t.amount||'',t.balance||''];});
  var csv=[h].concat(rows).map(function(r){return r.join(',');}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='taxnio_transactions_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

// ── HELPERS ──
function dIcon(t){if(!t)return'📄';var s=t.toLowerCase();if(s.includes('bank'))return'🏦';if(s.includes('itr'))return'📊';if(s.includes('gst'))return'🧾';if(s.includes('pan'))return'💳';if(s.includes('aadhaar'))return'🪪';if(s.includes('tally'))return'📉';return'📁';}
function fmtD(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function fmtN(n){if(!n||isNaN(n))return'0';return n.toLocaleString('en-IN',{maximumFractionDigits:0});}

sb.auth.getSession().then(function(res){if(res.data&&res.data.session)bootApp(res.data.session.user);});
