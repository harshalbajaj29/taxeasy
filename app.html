<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxnio — CA Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Source+Sans+3:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#fdf8f0;--cream2:#f7f0e4;--cream3:#ede4d3;--cream4:#e0d4be;
  --brown:#3d2b1f;--brown2:#5c4033;--brown3:#7d5a4a;--brown4:#a67c6a;
  --brown-light:#c4a882;--brown-lighter:#e8d9c4;
  --accent:#8b4513;--accent2:#6d3410;--accent-light:#f5e8dc;--accent-mid:#d4956a;
  --green:#2d6a4f;--green-light:#e8f5ee;--green-mid:#95c4a8;
  --amber:#b5720a;--amber-light:#fef3dc;
  --red:#8b1a1a;--red-light:#fdecea;
  --blue:#1a3a5c;--blue-light:#e8f0f8;
  --purple:#4a2070;--purple-light:#f0eaf8;
  --text:var(--brown);--text2:var(--brown3);--text3:var(--brown4);--text4:var(--brown-light);
  --border:var(--cream3);--border2:var(--cream4);
  --surface:var(--cream);--surface2:var(--cream2);--surface3:var(--cream3);
  --r:8px;--r-lg:14px;
  --shadow:0 1px 4px rgba(61,43,31,.08);
  --shadow-md:0 4px 16px rgba(61,43,31,.10);
  --shadow-lg:0 8px 32px rgba(61,43,31,.12);
}
html,body{height:100%;font-family:'Source Sans 3',sans-serif;background:var(--cream2);color:var(--brown);font-size:14px;line-height:1.6}
button,input,select,textarea{font-family:inherit}
h1,h2,h3,h4{font-family:'Playfair Display',serif;font-weight:600;color:var(--brown)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--cream2)}
::-webkit-scrollbar-thumb{background:var(--brown-lighter);border-radius:4px}

/* LOGIN */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--cream2);
  background-image:radial-gradient(ellipse 80% 60% at 20% 50%,rgba(139,69,19,.06) 0%,transparent 60%),
                   radial-gradient(ellipse 60% 60% at 80% 80%,rgba(139,69,19,.04) 0%,transparent 50%)}
.login-wrap{width:100%;max-width:440px;padding:24px}
.login-brand{display:flex;align-items:center;justify-content:center;margin-bottom:36px}
.login-card{background:var(--cream);border:1px solid var(--cream3);border-radius:var(--r-lg);padding:40px 36px;box-shadow:var(--shadow-lg)}
.login-card h2{font-size:24px;margin-bottom:6px;color:var(--brown)}
.login-card .subtitle{color:var(--brown3);font-size:14px;margin-bottom:28px}
.form-field{margin-bottom:18px}
.form-field label{display:block;font-size:11px;font-weight:600;color:var(--brown3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.form-field input{width:100%;padding:11px 14px;background:var(--cream2);border:1.5px solid var(--cream3);border-radius:var(--r);color:var(--brown);font-size:14px;transition:border-color .15s}
.form-field input:focus{outline:none;border-color:var(--accent);background:var(--cream)}
.form-field input::placeholder{color:var(--brown4)}
.btn-login{width:100%;padding:12px;background:var(--accent);border:none;border-radius:var(--r);color:var(--cream);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .15s;font-family:'Source Sans 3',sans-serif}
.btn-login:hover{background:var(--accent2)}
.login-error{color:var(--red);font-size:12px;margin-top:10px;min-height:16px}

/* APP */
#app{display:none;height:100vh;flex-direction:column}
#app.visible{display:flex}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;border-bottom:1.5px solid var(--cream3);background:var(--cream);flex-shrink:0;height:58px;box-shadow:var(--shadow)}
.topbar-logo{display:flex;align-items:center;margin-right:8px;flex-shrink:0}
.topbar-divider{width:1px;height:28px;background:var(--cream3);flex-shrink:0}
.topbar-search{flex:1;position:relative}
.topbar-search input{width:100%;padding:7px 12px 7px 34px;background:var(--cream2);border:1.5px solid var(--cream3);border-radius:var(--r);color:var(--brown);font-size:13px;transition:all .15s}
.topbar-search input:focus{outline:none;border-color:var(--accent-mid);background:var(--cream)}
.topbar-search input::placeholder{color:var(--brown4)}
.topbar-search::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
.client-sel{padding:7px 28px 7px 12px;background:var(--cream2);border:1.5px solid var(--cream3);border-radius:var(--r);color:var(--brown);font-size:13px;font-weight:500;cursor:pointer;appearance:none;min-width:200px;font-family:'Source Sans 3',sans-serif}
.client-sel:focus{outline:none;border-color:var(--accent-mid)}
.sel-wrap{position:relative;flex-shrink:0}
.sel-wrap::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--brown4);pointer-events:none}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.notif-btn{position:relative;width:34px;height:34px;border-radius:50%;background:var(--cream2);border:1.5px solid var(--cream3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .15s}
.notif-btn:hover{border-color:var(--accent-mid);background:var(--accent-light)}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--red);border:1.5px solid var(--cream)}
.btn-sm{padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--cream3);background:var(--cream2);color:var(--brown2);transition:all .12s}
.btn-sm:hover{border-color:var(--accent-mid);color:var(--accent)}
.btn-primary-sm{padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;background:var(--accent);border:none;color:var(--cream);transition:background .12s}
.btn-primary-sm:hover{background:var(--accent2)}
.user-chip{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--cream2);border:1.5px solid var(--cream3);border-radius:20px;cursor:pointer;transition:all .12s}
.user-chip:hover{border-color:var(--accent-mid)}
.user-av{width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--cream)}
.user-name{font-size:12px;font-weight:500;color:var(--brown2)}

/* LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:210px;flex-shrink:0;background:var(--cream);border-right:1.5px solid var(--cream3);display:flex;flex-direction:column;overflow-y:auto}
.sb-section{padding:16px 10px 8px}
.sb-label{font-size:10px;font-weight:600;color:var(--brown4);text-transform:uppercase;letter-spacing:.9px;padding:0 8px;margin-bottom:6px}
.nav-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);font-size:13px;font-weight:500;color:var(--brown3);cursor:pointer;transition:all .12s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:'Source Sans 3',sans-serif}
.nav-btn:hover{background:var(--cream2);color:var(--brown)}
.nav-btn.active{background:var(--accent-light);color:var(--accent);font-weight:600;border-left:3px solid var(--accent);padding-left:7px}
.nav-btn svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-btn.active svg{opacity:1}
.nav-badge{margin-left:auto;font-size:9px;font-weight:700;background:var(--red);color:white;padding:1px 6px;border-radius:10px}
.sb-footer{padding:12px 10px;border-top:1.5px solid var(--cream3);margin-top:auto}
.user-info-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);background:var(--cream2)}
.user-av-lg{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--cream);flex-shrink:0}
.user-meta{flex:1;min-width:0}
.user-email-text{font-size:12px;font-weight:500;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-tag-text{font-size:10px;color:var(--brown4)}
.logout-btn{background:none;border:none;cursor:pointer;color:var(--brown4);padding:4px;border-radius:6px;font-size:14px;transition:color .12s}
.logout-btn:hover{color:var(--red)}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:var(--cream2)}
.page-head{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1.5px solid var(--cream3);background:var(--cream);flex-shrink:0}
.page-head h1{font-size:17px;color:var(--brown)}
.page-head p{font-size:12px;color:var(--brown4);margin-top:1px}
.page-actions{display:flex;gap:8px}
.page{flex:1;overflow-y:auto;padding:20px 22px}

/* CARDS */
.card{background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r-lg);box-shadow:var(--shadow)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1.5px solid var(--cream3)}
.card-head h3{font-size:13px;font-weight:600;color:var(--brown)}
.card-count{font-size:10px;font-weight:600;color:var(--brown4);background:var(--cream2);padding:2px 8px;border-radius:20px;border:1px solid var(--cream3)}

/* STAT CARDS */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r-lg);padding:16px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.stat-card:hover{border-color:var(--accent-mid);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.stat-emoji{font-size:20px;margin-bottom:10px}
.stat-label{font-size:10px;font-weight:600;color:var(--brown4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.stat-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1;color:var(--brown)}
.stat-sub{font-size:10px;color:var(--brown4);margin-top:5px}
.stat-card.green .stat-val{color:var(--green)}
.stat-card.amber .stat-val{color:var(--amber)}
.stat-card.red .stat-val{color:var(--red)}
.stat-card.blue .stat-val{color:var(--blue)}
.stat-card.accent .stat-val{color:var(--accent)}

/* CALENDAR */
.calendar-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.cal-card{background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow)}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--brown)}
.cal-subtitle{font-size:11px;color:var(--brown4)}
.cal-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px}
.cal-badge.ai{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-mid)}
.cal-badge.custom{background:var(--blue-light);color:var(--blue);border:1px solid #b8d0e8}
.deadline-list{display:flex;flex-direction:column;gap:8px}
.deadline-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);border:1px solid var(--cream3);background:var(--cream2);transition:all .12s}
.deadline-item:hover{border-color:var(--accent-mid);background:var(--accent-light)}
.deadline-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.deadline-info{flex:1;min-width:0}
.deadline-name{font-size:13px;font-weight:500;color:var(--brown)}
.deadline-desc{font-size:11px;color:var(--brown4)}
.deadline-date{font-size:12px;font-weight:600;font-family:'DM Mono',monospace;white-space:nowrap}
.d-urgent{color:var(--red);background:var(--red-light);border-color:#f0c0c0}
.d-soon{color:var(--amber);background:var(--amber-light);border-color:#e8d4a0}
.d-ok{color:var(--green);background:var(--green-light);border-color:var(--green-mid)}
.add-event-btn{width:100%;margin-top:12px;padding:8px;border-radius:var(--r);border:1.5px dashed var(--cream4);background:transparent;color:var(--brown4);font-size:12px;cursor:pointer;transition:all .12s;font-family:'Source Sans 3',sans-serif}
.add-event-btn:hover{border-color:var(--accent-mid);color:var(--accent);background:var(--accent-light)}
.custom-event{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--r);border:1px solid var(--blue-light);background:#f0f5fc;margin-bottom:6px}
.custom-event-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0}
.custom-event-info{flex:1;min-width:0}
.custom-event-name{font-size:13px;font-weight:500;color:var(--blue)}
.custom-event-date{font-size:10px;color:var(--brown4)}
.custom-event-del{background:none;border:none;cursor:pointer;color:var(--brown4);font-size:14px;padding:0 4px;transition:color .12s}
.custom-event-del:hover{color:var(--red)}

/* HOME GRID */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.home-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:18px}

/* ACTIVITY FEED */
.feed-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--cream3);transition:background .08s;cursor:pointer}
.feed-item:hover{background:var(--cream2)}
.feed-item:last-child{border-bottom:none}
.feed-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.feed-info{flex:1;min-width:0}
.feed-title{font-size:13px;font-weight:500;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feed-sub{font-size:11px;color:var(--brown4);margin-top:2px}
.feed-time{font-size:10px;color:var(--brown4);white-space:nowrap;font-family:'DM Mono',monospace}
.feed-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}

/* OUTSTANDING */
.outstanding-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--cream3);transition:background .08s}
.outstanding-item:hover{background:var(--cream2)}
.outstanding-item:last-child{border-bottom:none}
.outstanding-av{width:32px;height:32px;border-radius:50%;background:var(--accent-light);border:1px solid var(--accent-mid);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;flex-shrink:0}
.outstanding-info{flex:1;min-width:0}
.outstanding-name{font-size:13px;font-weight:500;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.outstanding-days{font-size:11px;color:var(--brown4)}
.outstanding-amt{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--red);margin-right:8px}
.remind-btn{padding:5px 10px;border-radius:var(--r);background:var(--accent-light);border:1px solid var(--accent-mid);color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap;flex-shrink:0}
.remind-btn:hover{background:var(--accent);color:var(--cream)}

/* URGENT Q&A */
.qa-urgent{padding:10px 14px;border-bottom:1px solid var(--cream3);cursor:pointer;transition:background .08s}
.qa-urgent:hover{background:var(--cream2)}
.qa-urgent:last-child{border-bottom:none}
.qa-q{font-size:13px;font-weight:500;color:var(--brown);margin-bottom:3px}
.qa-meta{display:flex;align-items:center;gap:8px}
.qa-client{font-size:11px;color:var(--brown4);font-family:'DM Mono',monospace}
.qa-time{font-size:10px;color:var(--brown4)}
.qa-reply-btn{margin-top:6px;padding:5px 10px;border-radius:var(--r);background:var(--accent);border:none;color:var(--cream);font-size:11px;font-weight:600;cursor:pointer}

/* CHALLAN STATUS */
.challan-item{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--cream3)}
.challan-item:last-child{border-bottom:none}
.challan-info{flex:1;min-width:0}
.challan-name{font-size:12px;font-weight:500;color:var(--brown)}
.challan-client{font-size:11px;color:var(--brown4)}
.challan-amt{font-size:13px;font-weight:600;color:var(--brown2);font-family:'DM Mono',monospace;margin-right:8px}

/* QUICK ACTIONS */
.quick-actions{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.quick-btn{background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r-lg);padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.quick-btn:hover{border-color:var(--accent-mid);background:var(--accent-light);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.quick-icon{font-size:22px;margin-bottom:6px}
.quick-label{font-size:11px;font-weight:600;color:var(--brown2)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:capitalize}
.b-receipt,.b-answered{background:var(--green-light);color:var(--green)}
.b-invoice{background:#e8edff;color:#3b5bdb}
.b-expense{background:var(--amber-light);color:var(--amber)}
.b-document{background:var(--amber-light);color:var(--amber)}
.b-question{background:var(--blue-light);color:var(--blue)}
.b-appointment{background:var(--purple-light);color:var(--purple)}
.b-general,.b-general_text{background:var(--cream3);color:var(--brown4)}
.b-pending{background:var(--amber-light);color:var(--amber)}
.b-confirmed{background:var(--green-light);color:var(--green)}
.b-paid{background:var(--green-light);color:var(--green)}
.b-unpaid{background:var(--red-light);color:var(--red)}
.b-overdue{background:var(--red-light);color:var(--red)}
.b-review{background:var(--red-light);color:var(--red)}
.b-processed{background:var(--green-light);color:var(--green)}
.b-active{background:var(--green-light);color:var(--green)}
.b-inactive{background:var(--red-light);color:var(--red)}

/* TABLE */
.table-wrap{overflow:auto;flex:1}
table{width:100%;border-collapse:collapse}
thead th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--brown4);text-transform:uppercase;letter-spacing:.6px;border-bottom:1.5px solid var(--cream3);white-space:nowrap;background:var(--cream2);position:sticky;top:0;z-index:1}
tbody td{padding:11px 14px;border-bottom:1px solid var(--cream3);vertical-align:middle;color:var(--brown);font-size:13px}
tbody tr{cursor:pointer;transition:background .08s}
tbody tr:hover td{background:var(--cream2)}
tbody tr:last-child td{border-bottom:none}
.mono{font-family:'DM Mono',monospace;font-size:12px}
.amt{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:var(--green)}
.desc-cell{color:var(--brown3);max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:.3}
.empty p{color:var(--brown4);font-size:13px}

/* SPINNER */
.spin-wrap{display:flex;align-items:center;justify-content:center;padding:60px}
.spinner{width:24px;height:24px;border:2.5px solid var(--cream3);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* PANEL */
.panel{background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r-lg);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1.5px solid var(--cream3);flex-shrink:0;background:var(--cream2)}
.panel-head h3{font-size:13px;font-weight:600;color:var(--brown)}
.panel-count{font-size:10px;font-weight:600;color:var(--brown4);background:var(--cream3);padding:2px 8px;border-radius:20px}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;padding:8px 12px;border-bottom:1.5px solid var(--cream3);flex-shrink:0;align-items:center;background:var(--cream2)}
.search-input{width:100%;padding:7px 10px;background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r);color:var(--brown);font-size:13px;transition:border-color .12s;font-family:'Source Sans 3',sans-serif}
.search-input:focus{outline:none;border-color:var(--accent-mid)}
.search-input::placeholder{color:var(--brown4)}
.type-select{padding:7px 10px;background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r);color:var(--brown);font-size:12px;cursor:pointer;font-family:'Source Sans 3',sans-serif}

/* DRAWER */
.overlay{display:none;position:fixed;inset:0;background:rgba(61,43,31,.3);z-index:90;backdrop-filter:blur(2px)}
.overlay.open{display:block}
.drawer{position:fixed;right:-500px;top:0;width:480px;height:100vh;background:var(--cream);border-left:1.5px solid var(--cream3);z-index:100;transition:right .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column;box-shadow:-4px 0 32px rgba(61,43,31,.12)}
.drawer.open{right:0}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1.5px solid var(--cream3);flex-shrink:0;background:var(--cream2)}
.drawer-head h3{font-size:16px;color:var(--brown)}
.drawer-close{background:var(--cream);border:1.5px solid var(--cream3);border-radius:6px;color:var(--brown3);cursor:pointer;padding:4px 9px;font-size:15px;line-height:1;transition:all .12s}
.drawer-close:hover{color:var(--brown)}
.drawer-body{padding:22px;flex:1}
.dr{margin-bottom:18px}
.dr .dl{font-size:10px;font-weight:700;color:var(--brown4);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.dr .dv{font-size:14px;color:var(--brown)}
.dr .dv.big{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--green)}
.drawer-divider{border:none;border-top:1.5px solid var(--cream3);margin:18px 0}
.raw-box{background:var(--cream2);border:1px solid var(--cream3);border-radius:var(--r);padding:12px;font-size:11px;color:var(--brown3);font-family:'DM Mono',monospace;line-height:1.8;white-space:pre-wrap;word-break:break-word;max-height:180px;overflow-y:auto}
.ai-box{background:var(--accent-light);border:1px solid var(--accent-mid);border-radius:var(--r);padding:14px;font-size:13px;color:var(--brown);line-height:1.7;margin-top:4px}
.reply-wrap{margin-top:8px}
.reply-wrap textarea{width:100%;padding:10px 12px;background:var(--cream2);border:1.5px solid var(--cream3);border-radius:var(--r);color:var(--brown);font-size:13px;resize:vertical;min-height:80px;transition:border-color .12s;font-family:'Source Sans 3',sans-serif}
.reply-wrap textarea:focus{outline:none;border-color:var(--accent-mid)}
.reply-wrap textarea::placeholder{color:var(--brown4)}
.btn-reply{margin-top:8px;padding:9px 18px;background:var(--accent);border:none;border-radius:var(--r);color:var(--cream);font-size:13px;font-weight:600;cursor:pointer;transition:background .12s;font-family:'Source Sans 3',sans-serif}
.btn-reply:hover{background:var(--accent2)}
.reply-sent{color:var(--green);font-size:12px;font-weight:500;margin-top:6px;display:none}

/* CLIENT 360 */
.client-360{display:grid;grid-template-columns:280px 1fr;gap:16px;height:calc(100vh - 130px)}
.client-info-card{background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.client-av-big{width:54px;height:54px;border-radius:50%;background:var(--accent-light);border:2px solid var(--accent-mid);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;flex-shrink:0}
.client-name-big{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:var(--brown)}
.client-phone-sm{font-size:12px;color:var(--brown4);font-family:'DM Mono',monospace}
.info-field .lbl{font-size:10px;font-weight:600;color:var(--brown4);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.info-field .val{font-size:13px;color:var(--brown)}
.action-btn{padding:8px 12px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--cream3);background:var(--cream2);color:var(--brown2);text-align:center;transition:all .12s;width:100%;margin-bottom:6px;font-family:'Source Sans 3',sans-serif}
.action-btn:hover{border-color:var(--accent-mid);color:var(--accent);background:var(--accent-light)}
.action-btn.primary{background:var(--accent);color:var(--cream);border-color:var(--accent)}
.action-btn.primary:hover{background:var(--accent2)}
.tabs-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tab-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--cream3);background:var(--cream);color:var(--brown3);transition:all .12s;white-space:nowrap;font-family:'Source Sans 3',sans-serif}
.tab-btn.active{background:var(--accent);color:var(--cream);border-color:var(--accent)}
.tab-btn:hover:not(.active){border-color:var(--accent-mid);color:var(--brown)}
.tab-content{background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow);flex:1}

/* DOC GRID */
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:14px}
.doc-card{background:var(--cream2);border:1.5px solid var(--cream3);border-radius:var(--r-lg);padding:14px;cursor:pointer;transition:all .15s}
.doc-card:hover{border-color:var(--accent-mid);box-shadow:var(--shadow-md)}
.doc-icon{font-size:26px;margin-bottom:8px}
.doc-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--brown)}
.doc-type{font-size:10px;color:var(--brown4)}
.doc-date{font-size:10px;color:var(--brown4);margin-top:3px}

/* COMING SOON */
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;flex:1}
.coming-soon h3{font-size:17px;color:var(--brown);margin-bottom:8px}
.coming-soon p{font-size:13px;color:var(--brown4);max-width:280px;line-height:1.7}
.coming-soon .tag{display:inline-block;margin-top:12px;padding:5px 14px;background:var(--accent-light);color:var(--accent);border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--accent-mid)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(61,43,31,.4);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:var(--cream);border-radius:var(--r-lg);padding:26px;width:100%;max-width:500px;box-shadow:var(--shadow-lg);border:1.5px solid var(--cream3)}
.modal h3{font-size:17px;color:var(--brown);margin-bottom:18px}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:11px;font-weight:600;color:var(--brown3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;padding:9px 12px;background:var(--cream2);border:1.5px solid var(--cream3);border-radius:var(--r);color:var(--brown);font-size:13px;transition:border-color .12s;font-family:'Source Sans 3',sans-serif}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{outline:none;border-color:var(--accent-mid)}
.modal-field textarea{min-height:80px;resize:vertical}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.modal-btn-cancel{padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--cream3);background:var(--cream2);color:var(--brown3);font-family:'Source Sans 3',sans-serif}
.modal-btn-save{padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;background:var(--accent);border:none;color:var(--cream);font-family:'Source Sans 3',sans-serif}

/* UPLOAD ZONE */
.upload-zone{border:2px dashed var(--cream4);border-radius:var(--r-lg);padding:28px;text-align:center;cursor:pointer;transition:all .15s;background:var(--cream2)}
.upload-zone:hover{border-color:var(--accent-mid);background:var(--accent-light)}
.upload-zone p{font-size:13px;color:var(--brown3);margin-top:6px}

/* CLIENT LIST */
.client-list{overflow-y:auto;flex:1}
.client-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--cream3);transition:background .1s;position:relative}
.client-item:hover{background:var(--cream2)}
.client-item.active{background:var(--accent-light)}
.client-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.cl-av{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;border:1px solid var(--accent-mid)}
.cl-info{flex:1;min-width:0}
.cl-name{font-size:13px;font-weight:500;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl-meta{font-size:11px;color:var(--brown4);margin-top:1px}
.cl-badge{font-size:10px;font-weight:600;background:var(--cream3);color:var(--brown3);padding:2px 7px;border-radius:20px;flex-shrink:0}

/* CLIENT HEALTH */
.health-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.health-active{background:#27ae60}
.health-quiet{background:#f39c12}
.health-inactive{background:#c0392b}

/* REMINDER ITEM */
.reminder-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--cream3);transition:background .08s;cursor:pointer}
.reminder-item:hover{background:var(--cream2)}
.reminder-item:last-child{border-bottom:none}
.reminder-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.reminder-info{flex:1;min-width:0}
.reminder-title{font-size:13px;font-weight:500;color:var(--brown)}
.reminder-meta{font-size:11px;color:var(--brown4);margin-top:2px}
.reminder-date{font-size:11px;font-family:'DM Mono',monospace;color:var(--amber);font-weight:500;white-space:nowrap}

/* APPT ITEM */
.appt-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--cream3);cursor:pointer;transition:background .08s}
.appt-item:hover{background:var(--cream2)}
.appt-item:last-child{border-bottom:none}
.appt-date-box{width:44px;height:44px;border-radius:var(--r);background:var(--purple-light);border:1px solid #d8c8f0;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.appt-info{flex:1;min-width:0}
.appt-time{font-size:13px;font-weight:500;color:var(--brown)}
.appt-client{font-size:11px;color:var(--brown4);font-family:'DM Mono',monospace}
.appt-notes{font-size:11px;color:var(--brown3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.two-col{display:grid;grid-template-columns:260px 1fr;gap:14px}

/* CATEGORY COLORS */
.cat-fuel{background:#fef3dc;color:#b5720a;border:1px solid #e8d090}
.cat-groceries{background:#e8f5ee;color:#2d6a4f;border:1px solid #95c4a8}
.cat-salary{background:#e8f0f8;color:#1a3a5c;border:1px solid #90b4d8}
.cat-rent{background:#f0eaf8;color:#4a2070;border:1px solid #c0a0e0}
.cat-office{background:#fdecea;color:#8b1a1a;border:1px solid #e0a0a0}
.cat-travel{background:#e8edff;color:#3b5bdb;border:1px solid #a0b0f0}
.cat-medical{background:#fff0e8;color:#8b4513;border:1px solid #d4906a}
.cat-utilities{background:#f0f8e8;color:#3d6b1f;border:1px solid #a0c480}
.cat-gst{background:#fef3dc;color:#8b6010;border:1px solid #d4b060}
.cat-tds{background:#f8e8f0;color:#6b1a50;border:1px solid #d090b8}
.cat-entertainment{background:#e8f8f8;color:#1a6b6b;border:1px solid #80c4c4}
.cat-bank_charges{background:#f4f4f4;color:#555;border:1px solid #ccc}
.cat-suspense{background:#fff0e0;color:#c05000;border:1px solid #e09060}
.cat-insurance{background:#e8f0e8;color:#2d502d;border:1px solid #90b490}
.cat-other{background:#f0f0f0;color:#666;border:1px solid #ccc}

/* SPENDING CHART */
.spend-card{background:var(--cream);border:1.5px solid var(--cream3);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow)}
.spend-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.spend-bar-label{font-size:12px;font-weight:500;color:var(--brown);width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spend-bar-track{flex:1;height:10px;background:var(--cream3);border-radius:5px;overflow:hidden}
.spend-bar-fill{height:100%;border-radius:5px;transition:width .5s}
.spend-bar-amt{font-size:12px;font-weight:600;color:var(--brown2);font-family:'DM Mono',monospace;width:80px;text-align:right;flex-shrink:0}
.spend-bar-pct{font-size:10px;color:var(--brown4);width:32px;text-align:right;flex-shrink:0}

/* TRANSACTION TABLE */
.txn-cat-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;cursor:pointer;transition:opacity .12s}
.txn-cat-badge:hover{opacity:.8}
.txn-debit{color:var(--red);font-family:'DM Mono',monospace;font-size:12px;font-weight:600}
.txn-credit{color:var(--green);font-family:'DM Mono',monospace;font-size:12px;font-weight:600}

/* PROGRESS RING */
.progress-ring{position:relative;display:inline-flex;align-items:center;justify-content:center}

/* UPLOAD PROGRESS */
.upload-progress-bar{height:6px;background:var(--cream3);border-radius:3px;overflow:hidden;margin-top:12px}
.upload-progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.upload-status{font-size:12px;color:var(--brown3);margin-top:8px;text-align:center}

/* CLIENT DASHBOARD HEADER */
.client-dash-header{background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);border-radius:var(--r-lg);padding:22px;color:var(--cream);margin-bottom:16px;box-shadow:var(--shadow-md)}
.client-dash-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:white;margin-bottom:4px}
.client-dash-meta{font-size:13px;color:rgba(255,240,220,.7)}
.client-dash-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}
.client-dash-stat{background:rgba(255,255,255,.12);border-radius:var(--r);padding:12px;text-align:center}
.client-dash-stat-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:white}
.client-dash-stat-label{font-size:10px;color:rgba(255,240,220,.6);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-wrap">
    <div class="login-brand">
      <img src="taxnio-logo.png" alt="Taxnio" style="height:60px;width:auto" onerror="this.style.display='none'">
    </div>
    <div class="login-card">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your Taxnio CA dashboard</p>
      <div class="form-field"><label>Email address</label><input type="email" id="login-email" placeholder="ca@yourfirm.com" autofocus></div>
      <div class="form-field"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn-login" id="login-btn" onclick="doLogin()">Sign in to Dashboard</button>
      <div class="login-error" id="login-err"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-logo">
      <img src="taxnio-logo.png" alt="Taxnio" style="height:34px;width:auto" onerror="this.style.display='none'">
    </div>
    <div class="topbar-divider"></div>
    <div class="sel-wrap">
      <select class="client-sel" id="client-dropdown" onchange="onClientSelect(this.value)">
        <option value="">All Clients</option>
      </select>
    </div>
    <div class="topbar-search"><input type="text" placeholder="Search clients, receipts, documents..." id="global-search" oninput="onGlobalSearch(this.value)"></div>
    <div class="topbar-right">
      <div class="notif-btn" title="Notifications">🔔<div class="notif-dot" id="notif-dot" style="display:none"></div></div>
      <button class="btn-sm" onclick="loadData()">↺ Refresh</button>
      <button class="btn-primary-sm" onclick="openModal('reminder')">+ Reminder</button>
      <div class="user-chip" onclick="doLogout()" title="Sign out">
        <div class="user-av" id="user-av">CA</div>
        <span class="user-name" id="user-name-display">Loading</span>
        <span style="color:var(--brown4);font-size:12px">⏻</span>
      </div>
    </div>
  </div>

  <div class="app-body">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sb-section">
        <div class="sb-label">Main</div>
        <button class="nav-btn active" data-view="home" onclick="gotoView('home')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Overview
        </button>
        <button class="nav-btn" data-view="client360" onclick="gotoView('client360')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Client 360
        </button>
        <button class="nav-btn" data-view="clients" onclick="gotoView('clients')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Manage Clients
        </button>
      </div>
      <div class="sb-section">
        <div class="sb-label">Activity</div>
        <button class="nav-btn" data-view="receipts" onclick="gotoView('receipts')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Receipts
        </button>
        <button class="nav-btn" data-view="qna" onclick="gotoView('qna')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Q&amp;A Inbox
          <span class="nav-badge" id="qna-badge" style="display:none">0</span>
        </button>
        <button class="nav-btn" data-view="appointments" onclick="gotoView('appointments')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Appointments
          <span class="nav-badge" id="appt-badge" style="display:none">0</span>
        </button>
        <button class="nav-btn" data-view="documents" onclick="gotoView('documents')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>Documents
        </button>
        <button class="nav-btn" data-view="reminders" onclick="gotoView('reminders')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Reminders
        </button>
      </div>
      <div class="sb-section">
        <div class="sb-label">Finance</div>
        <button class="nav-btn" data-view="ca-invoices" onclick="gotoView('ca-invoices')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>CA Invoices
        </button>
        <button class="nav-btn" data-view="challans" onclick="gotoView('challans')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/></svg>Challans
        </button>
      </div>
      <div class="sb-section">
        <div class="sb-label">Bank & Spending</div>
        <button class="nav-btn" data-view="bank-statements" onclick="gotoView('bank-statements')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Bank Statements

/* COMPLIANCE CALENDAR */
function getComplianceDates(){
  const now=new Date();const m=now.getMonth();const y=now.getFullYear();
  const nm=m===11?0:m+1;const ny=m===11?y+1:y;
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dates=[];
  const addDate=(d,mon,yr,name,desc)=>{
    const dt=new Date(yr,mon,d);
    const diff=Math.floor((dt-now)/(1000*60*60*24));
    dates.push({date:d+' '+months[mon]+' '+yr,name,desc,diff,dt});
  };
  addDate(7,m,y,'TDS Payment','Deposit TDS deducted in previous month');
  addDate(11,m,y,'GSTR-1 Filing','File monthly sales return');
  addDate(13,m,y,'GSTR-2B','Auto-drafted ITC statement available');
  addDate(20,m,y,'GSTR-3B Filing','File summary GST return & pay tax');
  addDate(7,nm,ny,'TDS Payment (Next)','Deposit TDS deducted this month');
  addDate(11,nm,ny,'GSTR-1 (Next)','Next month sales return');
  if([2,5,8,11].includes(m))addDate(31,m,y,'TDS Return (Quarterly)','File TDS return for the quarter');
  if(m===2)addDate(31,m,y,'Professional Tax Maharashtra','Annual PT return due');
  if(m===2)addDate(31,m,y,'LUT Renewal','Letter of Undertaking for exporters');
  if([5,8,11,2].includes(m))addDate(15,m,y,'Advance Tax','Pay advance tax instalment');
  return dates.filter(d=>d.diff>=-1&&d.diff<=45).sort((a,b)=>a.diff-b.diff);
}

function timeSince(date){
  const diff=Math.floor((Date.now()-date)/1000);
  if(diff<60)return diff+'s ago';
  if(diff<3600)return Math.floor(diff/60)+'m ago';
  if(diff<86400)return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}

async function handleTallyUpload(input){
  if(!input.files||!input.files[0])return;
  const file=input.files[0];
  const fileName='tally_'+Date.now()+'_'+file.name;
  await sb.storage.from('documents').upload('tally/'+fileName,file,{contentType:file.type});
  const fileUrl=SUPA_URL+'/storage/v1/object/public/documents/tally/'+fileName;
  await sb.from('documents').insert({doc_type:'tally_backup',file_name:fileName,file_url:fileUrl,summary:'Tally backup — processing scheduled',status:'pending'});
  alert('Tally file uploaded successfully! It will be processed within 24 hours.');
}

async function uploadBankStatement(){
  const clientPhone=document.getElementById('bs-client').value;
  const bankName=document.getElementById('bs-bank').value.trim();
  const accountNum=document.getElementById('bs-account').value.trim();
  const periodFrom=document.getElementById('bs-from').value;
  const file=document.getElementById('bs-file').files[0];
  if(!clientPhone){alert('Please select a client');return}
  if(!file){alert('Please select a bank statement file');return}
  
  document.getElementById('upload-prog-bar').style.display='block';
  document.getElementById('upload-status').style.display='block';
  document.getElementById('upload-fill').style.width='10%';
  document.getElementById('upload-status').textContent='Uploading file...';
  document.querySelector('.modal-btn-save').disabled=true;
  document.querySelector('.modal-btn-save').textContent='Processing...';

  try {
    // Upload file to Supabase storage
    const fileName=clientPhone+'_bank_'+Date.now()+'_'+file.name;
    await sb.storage.from('documents').upload('bank-statements/'+fileName,file,{contentType:file.type});
    const fileUrl=SUPA_URL+'/storage/v1/object/public/documents/bank-statements/'+fileName;
    
    // Create bank statement record
    const{data:bsData}=await sb.from('bank_statements').insert({
      client_phone:clientPhone,file_name:file.name,file_url:fileUrl,
      bank_name:bankName||null,account_number:accountNum||null,
      period_from:periodFrom||null,status:'processing'
    }).select().single();
    
    document.getElementById('upload-fill').style.width='25%';
    document.getElementById('upload-status').textContent='Reading file content...';

    // Read file content
    const reader=new FileReader();
    reader.onload=async(e)=>{
      const fileContent=e.target.result;
      await processBankStatementWithClaude(fileContent, file.name, clientPhone, bsData.id);
    };
    reader.readAsText(file);
  } catch(err) {
    document.getElementById('upload-status').textContent='Error: '+err.message;
    document.querySelector('.modal-btn-save').disabled=false;
    document.querySelector('.modal-btn-save').textContent='Upload & Process with AI';
  }
}

/* ========== TRANSACTIONS ========== */
function renderTransactions(search,cat){
  let txns=transactions;
  if(selectedClient)txns=txns.filter(t=>t.client_phone===selectedClient.phone);
  if(cat)txns=txns.filter(t=>(t.ca_category||t.category)===cat);
  if(search)txns=txns.filter(t=>(t.description||'').toLowerCase().includes(search.toLowerCase()));
  const cats=['fuel','groceries','salary','rent','office','travel','medical','utilities','gst','tds','entertainment','bank_charges','insurance','suspense','other'];
  setContent(`<div class="panel" style="height:calc(100vh - 130px)">
    <div class="panel-head"><h3>Transactions</h3><span class="panel-count">${txns.length}</span></div>
    <div class="toolbar">
      <input class="search-input" style="flex:1" placeholder="Search transactions..." value="${search}" oninput="renderTransactions(this.value,document.getElementById('tcat').value)">
      <select class="type-select" id="tcat" onchange="renderTransactions(document.querySelector('#page-content .search-input').value,this.value)">
        <option value="">All categories</option>
        ${cats.map(c=>'<option value="'+c+'">'+c+'</option>').join('')}
      </select>
    </div>
    <div class="table-wrap">${txns.length===0?'<div class="empty"><div class="empty-icon">💳</div><p>No transactions yet. Upload a bank statement to get started.</p></div>':`<table><thead><tr><th>Date</th><th>Client</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th><th>Balance</th><th>Review</th></tr></thead><tbody>
      ${txns.map(t=>'<tr><td class="mono">'+(t.transaction_date||'—')+'</td><td>'+clientName(t.client_phone||'')+'</td><td class="desc-cell">'+(t.description||'—')+'</td><td><span class="txn-cat-badge cat-'+(t.ca_category||t.category||'other')+'" onclick="changeTxnCategory(''+t.id+'')">'+(t.ca_category||t.category||'other').replace('_',' ')+'</span></td><td><span class="badge '+(t.type==='credit'?'b-answered':'b-unpaid')+'">'+(t.type||'—')+'</span></td><td class="'+(t.type==='credit'?'txn-credit':'txn-debit')+'">'+(t.type==='credit'?'+':'−')+'₹'+fmtAmt(parseFloat(t.amount)||0)+'</td><td class="mono">'+(t.balance?'₹'+fmtAmt(parseFloat(t.balance)):'—')+'</td><td>'+(t.needs_review?'<span class="badge b-review">Review</span>':'')+'</td></tr>').join('')}
    </tbody></table>`}</div>
  </div>`);
}

/* ========== SPENDING ANALYSIS ========== */
function renderSpending(){
  let txns=transactions.filter(t=>t.type==='debit');
  if(selectedClient)txns=txns.filter(t=>t.client_phone===selectedClient.phone);
  const cats={};
  txns.forEach(t=>{const cat=t.ca_category||t.category||'other';cats[cat]=(cats[cat]||0)+(parseFloat(t.amount)||0);});
  const catEntries=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const total=Object.values(cats).reduce((s,v)=>s+v,0)||1;
  const catColors={fuel:'#e8920a',groceries:'#27ae60',salary:'#1a3a5c',rent:'#4a2070',office:'#8b1a1a',travel:'#3b5bdb',medical:'#8b4513',utilities:'#3d6b1f',gst:'#8b6010',tds:'#6b1a50',entertainment:'#1a6b6b',bank_charges:'#555',suspense:'#c05000',insurance:'#2d502d',other:'#888'};
  const catIcons={fuel:'⛽',groceries:'🛒',salary:'💼',rent:'🏠',office:'🖥️',travel:'✈️',medical:'🏥',utilities:'💡',gst:'📋',tds:'📊',entertainment:'🎬',bank_charges:'🏦',suspense:'❓',insurance:'🛡️',other:'📌'};
  const suspenseCount=transactions.filter(t=>t.category==='suspense'||t.needs_review).length;
  setContent(`
    <div style="display:grid;grid-template-columns:1fr 280px;gap:16px;margin-bottom:16px">
      <div class="spend-card">
        <h3 style="font-size:15px;color:var(--brown);margin-bottom:18px">Spending Breakdown</h3>
        ${catEntries.length===0?'<div class="empty"><div class="empty-icon">📊</div><p>No transaction data yet. Upload a bank statement to see spending analysis.</p></div>':
        catEntries.map(([cat,amt])=>`<div class="spend-bar-row">
          <div class="spend-bar-label">${catIcons[cat]||'📌'} <strong>${cat}</strong></div>
          <div class="spend-bar-track"><div class="spend-bar-fill" style="width:${Math.round(amt/total*100)}%;background:${catColors[cat]||'#888'}"></div></div>
          <div class="spend-bar-amt">₹${fmtAmt(amt)}</div>
          <div class="spend-bar-pct">${Math.round(amt/total*100)}%</div>
        </div>`).join('')}
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="spend-card" style="text-align:center">
          <div style="font-size:11px;color:var(--brown4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Total Debits</div>
          <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--red)">₹${fmtAmt(total)}</div>
          <div style="font-size:11px;color:var(--brown4);margin-top:4px">${txns.length} transactions</div>
        </div>
        <div class="spend-card" style="text-align:center">
          <div style="font-size:11px;color:var(--brown4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Total Credits</div>
          <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--green)">₹${fmtAmt(transactions.filter(t=>t.type==='credit'&&(selectedClient?t.client_phone===selectedClient.phone:true)).reduce((s,t)=>s+(parseFloat(t.amount)||0),0))}</div>
        </div>
        ${suspenseCount>0?`<div class="spend-card" style="border-color:#e0c090;background:#fef8ec;text-align:center;cursor:pointer" onclick="renderTransactions('','suspense')">
          <div style="font-size:24px;margin-bottom:6px">⚠️</div>
          <div style="font-size:13px;font-weight:600;color:#8b6010">${suspenseCount} Suspense Entries</div>
          <div style="font-size:11px;color:#a07820;margin-top:4px">Click to review</div>
        </div>`:''}
        <button class="btn-primary-sm" style="padding:10px" onclick="openModal('upload-bank')">+ Upload Bank Statement</button>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><h3>Category Breakdown Table</h3></div>
      <table><thead><tr><th>Category</th><th>Transactions</th><th>Total Amount</th><th>% of Spend</th></tr></thead><tbody>
        ${catEntries.map(([cat,amt])=>`<tr onclick="renderTransactions('','${cat}')">
          <td><span class="txn-cat-badge cat-${cat}">${catIcons[cat]||'📌'} ${cat.replace('_',' ')}</span></td>
          <td style="text-align:center">${txns.filter(t=>(t.ca_category||t.category)===cat).length}</td>
          <td class="amt">₹${fmtAmt(amt)}</td>
          <td><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:6px;background:var(--cream3);border-radius:3px;overflow:hidden"><div style="height:100%;width:${Math.round(amt/total*100)}%;background:${catColors[cat]||'#888'};border-radius:3px"></div></div><span style="font-size:12px;color:var(--brown4);width:32px">${Math.round(amt/total*100)}%</span></div></td>
        </tr>`).join('')}
      </tbody></table>
    </div>
  `);
}

/* ========== CLAUDE BANK STATEMENT PROCESSING ========== */
async function processBankStatementWithClaude(fileData, fileName, clientPhone, statementId){
  const statusEl=document.getElementById('upload-status');
  const fillEl=document.getElementById('upload-fill');
  
  try {
    if(statusEl)statusEl.textContent='Reading bank statement with Claude AI...';
    if(fillEl)fillEl.style.width='40%';

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{
          role: 'user',
          content: [{
            type: 'text',
            text: `You are an expert Indian CA assistant. Read this bank statement text and extract ALL transactions.

For each transaction return a JSON object with:
- transaction_date: (YYYY-MM-DD format)
- description: (cleaned transaction description)
- amount: (numeric, always positive)
- type: "debit" or "credit"
- balance: (running balance if available, else null)
- category: categorise each debit into exactly one of: fuel, groceries, salary, rent, office, travel, medical, utilities, gst, tds, entertainment, bank_charges, insurance, other, suspense
  - Use "suspense" ONLY if you genuinely cannot determine the category
  - Credits: use "salary", "business_income", "refund", "transfer", or "other"
- needs_review: true if suspense or ambiguous, false otherwise

Rules:
- HPCL, BPCL, IOCL, petrol = fuel
- SWIGGY, ZOMATO, BIGBASKET, DMART, RELIANCE FRESH = groceries  
- SALARY, SAL CR, PAYROLL = salary
- GST, GSTIN = gst
- TDS, INCOME TAX = tds
- IRCTC, UBER, OLA, airline = travel
- MEDICAL, PHARMACY, HOSPITAL = medical
- ELECTRICITY, WATER, BROADBAND, AIRTEL, JIO = utilities
- ATM withdrawal = bank_charges
- EMI, LOAN = other
- Unknown merchant codes, unclear descriptions = suspense

Return ONLY a valid JSON array. No markdown, no explanation, no backticks.
Example: [{"transaction_date":"2025-01-15","description":"HPCL FUEL","amount":3500,"type":"debit","balance":45000,"category":"fuel","needs_review":false}]

Bank statement text:
${fileData.slice(0, 8000)}`
          }]
        }]
      })
    });

    const data = await response.json();
    if(fillEl)fillEl.style.width='70%';
    
    const responseText = data.content?.[0]?.text || '[]';
    let transactions_parsed = [];
    
    try {
      const clean = responseText.replace(/```json/g,'').replace(/```/g,'').trim();
      transactions_parsed = JSON.parse(clean);
    } catch(e) {
      // Try to extract JSON array
      const match = responseText.match(/\[[\s\S]*\]/);
      if(match) transactions_parsed = JSON.parse(match[0]);
    }

    if(statusEl)statusEl.textContent=`Saving ${transactions_parsed.length} transactions...`;
    if(fillEl)fillEl.style.width='85%';

    // Save transactions to Supabase in batches
    const batchSize = 50;
    let totalCredits = 0, totalDebits = 0, suspenseCount = 0;
    
    for(let i = 0; i < transactions_parsed.length; i += batchSize) {
      const batch = transactions_parsed.slice(i, i+batchSize).map(t => ({
        client_phone: clientPhone,
        statement_id: statementId,
        transaction_date: t.transaction_date || null,
        description: t.description || '',
        amount: parseFloat(t.amount) || 0,
        type: t.type || 'debit',
        category: t.category || 'other',
        balance: t.balance ? parseFloat(t.balance) : null,
        needs_review: t.needs_review || false,
        is_approved: false
      }));
      
      batch.forEach(t => {
        if(t.type === 'credit') totalCredits += t.amount;
        else totalDebits += t.amount;
        if(t.category === 'suspense') suspenseCount++;
      });
      
      await sb.from('transactions').insert(batch);
    }

    // Update bank statement record
    await sb.from('bank_statements').update({
      status: 'done',
      transaction_count: transactions_parsed.length,
      total_credits: totalCredits,
      total_debits: totalDebits
    }).eq('id', statementId);

    if(fillEl)fillEl.style.width='100%';
    if(statusEl)statusEl.textContent=`✓ Done! ${transactions_parsed.length} transactions categorised. ${suspenseCount} in suspense.`;
    
    setTimeout(()=>{closeModal();loadData();}, 2000);

  } catch(err) {
    console.error(err);
    if(statusEl)statusEl.textContent='Error: '+err.message;
    await sb.from('bank_statements').update({status:'error'}).eq('id',statementId);
  }
}

/* ========== CATEGORY CHANGE ========== */
async function updateTxnCategory(id, category){
  if(!category)return;
  await sb.from('transactions').update({ca_category:category, needs_review:false}).eq('id',id);
  const t=transactions.find(x=>x.id===id);
  if(t){t.ca_category=category;t.needs_review=false;}
  renderView();
}

function changeTxnCategory(id){
  const cats=['fuel','groceries','salary','rent','office','travel','medical','utilities','gst','tds','entertainment','bank_charges','insurance','other','suspense'];
  const t=transactions.find(x=>x.id===id);if(!t)return;
  const current=t.ca_category||t.category||'other';
  const modal=document.getElementById('modal-content');
  const overlay=document.getElementById('modal-overlay');
  modal.innerHTML=`<h3>Change Category</h3>
    <p style="font-size:13px;color:var(--brown3);margin-bottom:16px">${t.description}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${cats.map(cat=>`<button onclick="updateTxnCategory('${id}','${cat}');closeModal()" style="padding:10px;border-radius:var(--r);border:1.5px solid ${current===cat?'var(--accent)':'var(--cream3)'};background:${current===cat?'var(--accent-light)':'var(--cream2)'};color:${current===cat?'var(--accent)':'var(--brown2)'};font-size:13px;font-weight:${current===cat?'700':'400'};cursor:pointer;font-family:inherit;text-align:left">${cat.replace('_',' ')}</button>`).join('')}
    </div>
    <div class="modal-btns"><button class="modal-btn-cancel" onclick="closeModal()">Cancel</button></div>`;
  overlay.classList.add('open');
}

function openBSDrawer(id){
  const bs=bankStatements.find(x=>x.id===id);if(!bs)return;
  document.getElementById('drawer-title').textContent='Bank Statement';
  document.getElementById('drawer-body').innerHTML=`
    <div class="dr"><div class="dl">Client</div><div class="dv">${clientName(bs.client_phone||'')}</div></div>
    <div class="dr"><div class="dl">Bank</div><div class="dv" style="font-weight:500">${bs.bank_name||'—'}</div></div>
    <div class="dr"><div class="dl">File</div><div class="dv mono">${bs.file_name||'—'}</div></div>
    <div class="dr"><div class="dl">Period</div><div class="dv">${bs.period_from?fmtDate(bs.period_from)+' to '+fmtDate(bs.period_to):'—'}</div></div>
    <div class="dr"><div class="dl">Status</div><div class="dv"><span class="badge b-${bs.status==='done'?'answered':bs.status==='processing'?'pending':'review'}">${bs.status}</span></div></div>
    <hr class="drawer-divider">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div style="background:var(--green-light);border-radius:var(--r);padding:12px;text-align:center"><div style="font-size:10px;color:var(--green);font-weight:600;margin-bottom:4px">CREDITS</div><div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--green)">₹${fmtAmt(bs.total_credits||0)}</div></div>
      <div style="background:var(--red-light);border-radius:var(--r);padding:12px;text-align:center"><div style="font-size:10px;color:var(--red);font-weight:600;margin-bottom:4px">DEBITS</div><div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--red)">₹${fmtAmt(bs.total_debits||0)}</div></div>
    </div>
    <div class="dr" style="margin-top:16px"><div class="dl">Transactions</div><div class="dv" style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700">${bs.transaction_count||0}</div></div>
    ${bs.file_url?'<hr class="drawer-divider"><a href="'+bs.file_url+'" target="_blank" class="btn-reply" style="display:inline-block;text-decoration:none">↓ Download Statement</a>':''}`;
  openDrawer();
}

function exportTransactionsCSV(){
  const headers=['Date','Client','Description','Category','CA Category','Type','Amount','Balance'];
  const rows=transactions.map(t=>[t.transaction_date||'',clientName(t.client_phone||''),(t.description||'').replace(/,/g,' '),t.category||'',t.ca_category||'',t.type||'',t.amount||'',t.balance||'']);
  const csv=[headers,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='taxnio_transactions_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

function exportCSV(){
  const headers=['Date','Client','Type','Vendor','Amount','GST','Description'];
  const rows=invoices.map(i=>[fmtDate(i.received_at),clientName(i.client_phone||''),i.message_type||'',(i.vendor_name||'').replace(/,/g,' '),i.amount||'',i.gst_amount||'',(i.description||'').replace(/,/g,' ')]);
  const csv=[headers,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='taxnio_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
function docIcon(t){if(!t)return'📄';const s=t.toLowerCase();if(s.includes('bank'))return'🏦';if(s.includes('itr'))return'📊';if(s.includes('gst'))return'🧾';if(s.includes('pan'))return'💳';if(s.includes('aadhaar'))return'🪪';if(s.includes('tally'))return'📉';return'📁'}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}
function fmtAmt(n){if(!n||isNaN(n))return'0';return n.toLocaleString('en-IN',{maximumFractionDigits:0})}
sb.auth.getSession().then(({data:{session}})=>{if(session)bootApp(session.user)});
